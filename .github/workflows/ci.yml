name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_ENV: test
  APP_SECRET: ChangeMePleaseUseARealSecret
  DEFAULT_URI: http://localhost
  DATABASE_URL: mysql://app:!ChangeMe!@127.0.0.1:3306/app?serverVersion=9.7&charset=utf8mb4
  MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
  COMPOSER_ALLOW_SUPERUSER: "1"

jobs:
  qa:
    name: Quality (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.5"]

    services:
      mysql:
        image: mysql:9.7
        env:
          MYSQL_DATABASE: app
          MYSQL_USER: app
          MYSQL_PASSWORD: "!ChangeMe!"
          MYSQL_ROOT_PASSWORD: "!ChangeMeRoot!"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p!ChangeMeRoot!"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, iconv, intl, pdo_mysql, zip
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment
        run: |
          cp .env.dist .env
          php -r '
            $pdo = new PDO("mysql:host=127.0.0.1;port=3306", "root", "!ChangeMeRoot!");
            $pdo->exec("CREATE DATABASE IF NOT EXISTS app_test");
            $pdo->exec("GRANT ALL ON app_test.* TO '\''app'\''@'\''%'\''");
            echo "app_test ready\n";
          '

      - name: PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer check --diff

      - name: Twig-CS-Fixer
        run: vendor/bin/twig-cs-fixer lint --config=.twig-cs-fixer.dist.php

      - name: PHPStan
        run: |
          php bin/console cache:warmup --env=dev
          vendor/bin/phpstan analyse --memory-limit=512M -c phpstan.neon.dist

      - name: Rector
        run: vendor/bin/rector process --dry-run

      - name: PHPUnit
        run: vendor/bin/phpunit

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frankenphp_dev
        uses: docker/build-push-action@v6
        with:
          context: .
          target: frankenphp_dev
          push: false
          tags: symfony-frankenphp-dev:ci
          cache-from: type=gha,scope=frankenphp-dev
          cache-to: type=gha,mode=max,scope=frankenphp-dev

      - name: Build frankenphp_prod
        uses: docker/build-push-action@v6
        with:
          context: .
          target: frankenphp_prod
          push: false
          tags: symfony-frankenphp:ci
          cache-from: type=gha,scope=frankenphp-prod
          cache-to: type=gha,mode=max,scope=frankenphp-prod
