
services:
###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###

###> symfony/mercure-bundle ###
  # Hub stays on the Compose network; browsers use Caddy /.well-known/mercure.
  mercure:
    expose:
      - "80"
###< symfony/mercure-bundle ###
