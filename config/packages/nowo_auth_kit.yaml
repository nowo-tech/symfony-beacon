# nowo-tech/auth-kit-bundle — first-user bootstrap + i18n + remember me
# https://github.com/nowo-tech/AuthKitBundle
nowo_auth_kit:
    default_profile: default
    default_locale: en
    enabled_locales: [en, es, de, nl, fr, it, pt]
    # Prefix auth routes with /{_locale} (e.g. /en/login, /de/login)
    locale_in_path: true
    profiles:
        default:
            user_class: App\Identity\Entity\User
            user_identifier_field: email
            registration_mode: first_user_only
            registration_role: ROLE_ADMIN
            login_success_route: dashboard_home
            firewall: main
            login_fields:
                - identifier
                - password
                - remember_me
            registration_fields:
                - email
                - displayName
                - password
            remember_me:
                enabled: true
                lifetime: 604800
                path: /
            password_strength:
                enabled: true
                level: medium
                policy_mode: level
            password_reset:
                mode: disabled
            embed:
                mode: disabled
            templates:
                layout: '@NowoAuthKitBundle/layout.html.twig'
                login: '@NowoAuthKitBundle/security/login.html.twig'
                register: '@NowoAuthKitBundle/security/register.html.twig'
            routes:
                login:
                    path: /login
                    name: nowo_auth_kit_login
                logout:
                    path: /logout
                    name: nowo_auth_kit_logout
                register:
                    path: /register
                    name: nowo_auth_kit_register
