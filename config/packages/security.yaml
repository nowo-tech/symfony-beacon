security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto
  providers:
    app_user_provider:
      entity:
        class: App\Identity\Entity\User
        property: email
  firewalls:
    dev:
      pattern: ^/(_profiler|_wdt|assets|build)/
      security: false
    ingest:
      pattern: ^/api/\d+/envelope
      security: false
    main:
      lazy: true
      provider: app_user_provider
      form_login:
        login_path: nowo_auth_kit_login
        check_path: nowo_auth_kit_login
        enable_csrf: true
        default_target_path: dashboard_home
        username_parameter: 'login_form[_username]'
        password_parameter: 'login_form[_password]'
        csrf_parameter: 'login_form[_csrf_token]'
        csrf_token_id: authenticate
      login_link:
        check_route: app_magic_login_check
        check_post_only: false
        lifetime: 600
        max_uses: 1
        used_link_cache: cache.app
        signature_properties: ['email']
        default_target_path: dashboard_home
        login_path: app_magic_login_request
        failure_path: app_magic_login_request
      remember_me:
        secret: '%kernel.secret%'
        lifetime: 604800
        path: /
        remember_me_parameter: 'login_form[_remember_me]'
      login_throttling:
        max_attempts: 5
        interval: '15 minutes'
        limiter: nowo_login_throttle.database_rate_limiter
      logout:
        path: nowo_auth_kit_logout
        target: nowo_auth_kit_login
        invalidate_session: true
  access_control:
    - path: ^/$
      roles: PUBLIC_ACCESS
    - path: ^/(login|register|logout)$
      roles: PUBLIC_ACCESS
    - path: ^/login/magic
      roles: PUBLIC_ACCESS
    - path: ^/share/
      roles: PUBLIC_ACCESS
    - path: ^/(en|es|de|nl|fr|it|pt)/login
      roles: PUBLIC_ACCESS
    - path: ^/(en|es|de|nl|fr|it|pt)/register
      roles: PUBLIC_ACCESS
    - path: ^/(en|es|de|nl|fr|it|pt)/logout
      roles: PUBLIC_ACCESS
    - path: ^/api/\d+/envelope
      roles: PUBLIC_ACCESS
    - path: ^/(manifest\.webmanifest|sw\.js|offline)$
      roles: PUBLIC_ACCESS
    - path: ^/legal/
      roles: PUBLIC_ACCESS
    - path: '^/cookie_consent(_alt)?$'
      roles: PUBLIC_ACCESS
    - path: ^/cookie-consent/config
      roles: PUBLIC_ACCESS
    - path: ^/health/(live|ready)$
      roles: PUBLIC_ACCESS
    # First-run wizard (controller still denies when setup is complete / users exist)
    - path: ^/setup
      roles: PUBLIC_ACCESS
    - path: ^/
      roles: ROLE_USER
when@test:
  security:
    password_hashers:
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4
        time_cost: 3
        memory_cost: 10
    firewalls:
      main:
        login_link:
          lifetime: 600
          max_uses: 3
          used_link_cache: cache.app
