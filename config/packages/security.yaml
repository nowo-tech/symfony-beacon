security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Identity\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        ingest:
            pattern: ^/api/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: nowo_auth_kit_login
                check_path: nowo_auth_kit_login
                enable_csrf: true
                default_target_path: dashboard_home
                username_parameter: login_form[_username]
                password_parameter: login_form[_password]
                csrf_parameter: login_form[_csrf_token]
                csrf_token_id: authenticate
            logout:
                path: nowo_auth_kit_logout
                target: nowo_auth_kit_login
                invalidate_session: true

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
