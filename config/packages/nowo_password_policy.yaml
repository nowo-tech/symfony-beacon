# nowo-tech/password-policy-bundle
# https://github.com/nowo-tech/PasswordPolicyBundle
nowo_password_policy:
    entities:
        App\Identity\Entity\User:
            password_field: password
            password_history_field: passwordHistory
            passwords_to_remember: 5
            expiry_days: 90
            # Password reset flow is disabled in AuthKit; send users to account security.
            reset_password_route_name: account_security
            notified_routes:
                - account_profile
                - account_security
                - account_display
                - dashboard_home
            excluded_notified_routes:
                - nowo_auth_kit_login
                - nowo_auth_kit_logout
                - nowo_auth_kit_register
            detect_password_extensions: false
    expiry_listener:
        priority: 0
        redirect_on_expiry: false
        flash_strategy: once_per_session
        # Use session by default (works without Redis). For multi-worker FrankenPHP,
        # switch to flash_throttle_storage: cache + Redis/Memcached on cache.app.
        flash_throttle_storage: session
        error_msg:
            text:
                title: nowo_password_policy.title
                message: nowo_password_policy.message
            type: warning
    enable_logging: true
    log_level: info
