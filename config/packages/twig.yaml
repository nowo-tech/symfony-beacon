twig:
    file_name_pattern: '*.twig'
    form_themes:
        - '@NowoFormKit/form/static_blocks.html.twig'
        - 'form/beacon_theme.html.twig'
    paths:
        # CookieConsentBundle does not auto-register templates/bundles/ overrides (unlike AuthKit).
        '%kernel.project_dir%/templates/bundles/NowoCookieConsentBundle': NowoCookieConsentBundle
    globals:
        enabled_locales: '%kernel.enabled_locales%'
        default_locale: '%kernel.default_locale%'
        site_appearance: '@App\Shared\Appearance\SiteAppearanceProvider'
        app_section: '@App\Shared\Navigation\AppSectionResolver'


when@dev:
    twig:
        # Better Web Profiler Twig panel + Twig Inspector comments
        debug: true

when@test:
    twig:
        strict_variables: true
