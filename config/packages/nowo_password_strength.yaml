# nowo-tech/password-strength-bundle
# https://github.com/nowo-tech/PasswordStrengthBundle
# form_theme MUST be a Symfony base layout key (see Configuration / FORM_THEME_MAP), not the @PasswordStrengthBundle theme path.
nowo_password_strength:
    form_theme: tailwind_2_layout.html.twig
    feedback_position: below
    show_requirements: true
    live_feedback: true
    default_level: medium
    generator_mode: off
    use_password_toggle: true
    levels:
        weak:
            min_length: 6
        medium:
            min_length: 8
            require_lowercase: true
            require_uppercase: true
            require_digit: true
        strong:
            min_length: 12
            require_lowercase: true
            require_uppercase: true
            require_digit: true
            require_special: true
