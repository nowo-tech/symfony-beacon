# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    env(BEACON_RETENTION_DAYS): '0'
    env(BEACON_RETENTION_MAX_EVENTS_PER_PROJECT): '0'
    env(BEACON_INGEST_RATE_LIMIT): '120'
    env(BEACON_EVENT_QUOTA_DAILY): '0'
    env(BEACON_NOTIFICATIONS_ALLOW_PRIVATE_URLS): '0'
    env(BEACON_NOTIFICATION_DELIVERY_HISTORY_LIMIT): '20'
    beacon.retention_days: '%env(int:BEACON_RETENTION_DAYS)%'
    beacon.retention_max_events: '%env(int:BEACON_RETENTION_MAX_EVENTS_PER_PROJECT)%'
    beacon.ingest_rate_limit: '%env(int:BEACON_INGEST_RATE_LIMIT)%'
    beacon.event_quota_daily: '%env(int:BEACON_EVENT_QUOTA_DAILY)%'
    beacon.notifications.allow_private_urls: '%env(bool:BEACON_NOTIFICATIONS_ALLOW_PRIVATE_URLS)%'
    beacon.notifications.delivery_history_limit: '%env(int:BEACON_NOTIFICATION_DELIVERY_HISTORY_LIMIT)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Shared\Retention\RetentionPurger:
        arguments:
            $retentionDays: '%beacon.retention_days%'
            $maxEventsPerProject: '%beacon.retention_max_events%'

    App\Shared\Retention\RetentionPurgeCommand:
        arguments:
            $retentionDays: '%beacon.retention_days%'
            $maxEventsPerProject: '%beacon.retention_max_events%'

    App\Ingest\Service\IngestRateLimiter:
        arguments:
            $limitPerMinute: '%beacon.ingest_rate_limit%'

    App\Project\Service\ProjectGovernanceResolver:
        arguments:
            $defaultRetentionDays: '%beacon.retention_days%'
            $defaultRetentionMaxEvents: '%beacon.retention_max_events%'
            $defaultIngestRateLimit: '%beacon.ingest_rate_limit%'
            $defaultEventQuotaDaily: '%beacon.event_quota_daily%'

    App\Notifications\Service\OutboundUrlGuard:
        arguments:
            $allowPrivateUrls: '%beacon.notifications.allow_private_urls%'

    App\Notifications\Service\NotificationDeliveryHistoryRecorder:
        arguments:
            $historyLimit: '%beacon.notifications.delivery_history_limit%'

    # Prefer encrypted instance_settings.mailer_dsn; MAILER_DSN env is bootstrap/fallback only.
    Symfony\Component\Mailer\MailerInterface: '@App\Shared\Mailer\ConfiguredMailer'

    # AuditKit ships entity:null tags; DoctrineBundle 3 skips attach — bridge as event listener.
    App\Shared\Audit\AuditableDoctrineBridge:
        tags:
            - { name: doctrine.event_listener, event: prePersist, method: prePersist }
            - { name: doctrine.event_listener, event: preUpdate, method: preUpdate }

when@test:
    parameters:
        # Override env default so local webhook hosts (example.test) skip DNS SSRF checks in PHPUnit.
        beacon.notifications.allow_private_urls: true
