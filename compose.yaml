---
# Local / default stack: FrankenPHP dev image + bind-mounted app.
# Production image: docker compose build --build-arg… or
#   docker build --target frankenphp_prod -t symfony-frankenphp .
services:
  php:
    image: ${IMAGES_PREFIX:-}symfony-beacon-dev
    build:
      context: .
      target: frankenphp_dev
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      DEFAULT_URI: ${DEFAULT_URI:-https://localhost:9444}
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-ChangeMePleaseUseARealSecret}
      # Doctrine / MySQL (`database` service)
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-!ChangeMe!}@database:3306/${MYSQL_DATABASE:-app}?serverVersion=${MYSQL_VERSION:-9.7}&charset=utf8mb4
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=1}
      # --- FrankenPHP classic ↔ worker (see .docker/frankenphp/docker-entrypoint.sh) ---
      FRANKENPHP_MODE: ${FRANKENPHP_MODE:-classic}
      FRANKENPHP_WORKER_NUM: ${FRANKENPHP_WORKER_NUM:-}
      FRANKENPHP_LOOP_MAX: ${FRANKENPHP_LOOP_MAX:-500}
      FRANKENPHP_RESET_KERNEL: ${FRANKENPHP_RESET_KERNEL:-false}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      # Host bind-mount ./:/app is not owned by container root; silence Git "dubious ownership".
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /app
    volumes:
      # Bind-mount is required: without it, the image welcome index.php is served
      # and worker mode fails with "has not reached frankenphp_handle_request()".
      - ./:/app
      - ./.docker/frankenphp/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.docker/frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      - /app/var
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - target: 80
        published: ${HTTP_PORT:-9080}
        protocol: tcp
      - target: 443
        published: ${HTTPS_PORT:-9443}
        protocol: tcp
      # HTTP/3/UDP disabled locally: Caddy Alt-Svc h3=":443" does not match the
      # published HTTPS_PORT (e.g. 9444) and browsers leave /_wdt pending.
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true

  # Vite / Pentatrion (pnpm). Optional HMR — enable with: docker compose --profile hmr up -d
  # Default stack uses `make vite-build` (static public/build/). Leaving `pnpm run dev` running
  # rewrites entrypoints.json to viteServer mode and leaves a forever-pending HMR WebSocket
  # in the browser network panel ("page stuck downloading").
  # Browser loads /build over HTTPS via Caddy (see Caddyfile) — avoids mixed content.
  # Built files under public/build/ are served from disk; only missing paths hit this service.
  vite:
    profiles: ["hmr"]
    image: ${IMAGES_PREFIX:-}symfony-beacon-dev
    build:
      context: .
      target: frankenphp_dev
    restart: unless-stopped
    working_dir: /app
    depends_on:
      php:
        condition: service_started
    environment:
      # Always bind to the compose target port (host publishes VITE_PORT → 5173).
      VITE_LISTEN_PORT: "5173"
      VITE_PORT: "5173"
      VITE_DEV_SERVER_HOST: ${VITE_DEV_SERVER_HOST:-localhost}
      VITE_USE_POLLING: ${VITE_USE_POLLING:-0}
      DEFAULT_URI: ${DEFAULT_URI:-https://localhost:9444}
      HTTPS_PORT: ${HTTPS_PORT:-9444}
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /app
    volumes:
      - ./:/app
      - /app/var
    ports:
      - target: 5173
        published: ${VITE_PORT:-5173}
        protocol: tcp
    command: ["pnpm", "run", "dev"]
    # Image HEALTHCHECK probes FrankenPHP :2019; this service only runs Vite.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5173/build/@vite/client >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    tty: true

  ###> doctrine/doctrine-bundle ###
  # MySQL 9.7 (latest stable official: https://hub.docker.com/_/mysql)
  database:
    image: mysql:${MYSQL_VERSION:-9.7}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-!ChangeMe!}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-!ChangeMeRoot!}
    volumes:
      - database_data:/var/lib/mysql
    ports:
      - target: 3306
        published: ${MYSQL_PORT:-3307}
        protocol: tcp
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD:-!ChangeMeRoot!}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
  ###< doctrine/doctrine-bundle ###

  # Symfony Messenger worker (consumes the async MySQL queue).
  # Different from FRANKENPHP_MODE=worker (HTTP). This service does NOT serve HTTP.
  messenger:
    image: ${IMAGES_PREFIX:-}symfony-beacon-dev
    build:
      context: .
      target: frankenphp_dev
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      php:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-ChangeMePleaseUseARealSecret}
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-!ChangeMe!}@database:3306/${MYSQL_DATABASE:-app}?serverVersion=${MYSQL_VERSION:-9.7}&charset=utf8mb4
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=1}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /app
    volumes:
      - ./:/app
      - /app/var
    # Entrypoint prepares vendor/DB; then consumes the async queue.
    # --time-limit restarts the process periodically (Compose brings it back up).
    command:
      [
        "php",
        "bin/console",
        "messenger:consume",
        "async",
        "-vv",
        "--time-limit=3600",
        "--memory-limit=128M",
      ]
    # Image HEALTHCHECK expects FrankenPHP :2019; this process only runs Messenger.
    healthcheck:
      disable: true
    tty: true

volumes:
  caddy_data:
  caddy_config:
  ###> doctrine/doctrine-bundle ###
  database_data:
  ###< doctrine/doctrine-bundle ###
