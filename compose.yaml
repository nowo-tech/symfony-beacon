---
# Local / default stack: FrankenPHP dev image + bind-mounted app.
# Production image: docker compose build --build-arg… or
#   docker build --target frankenphp_prod -t symfony-frankenphp .
services:
  php:
    image: ${IMAGES_PREFIX:-}symfony-beacon-dev
    build:
      context: .
      target: frankenphp_dev
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-ChangeMePleaseUseARealSecret}
      # Doctrine / MySQL (`database` service)
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-!ChangeMe!}@database:3306/${MYSQL_DATABASE:-app}?serverVersion=${MYSQL_VERSION:-9.7}&charset=utf8mb4
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=1}
      # --- FrankenPHP classic ↔ worker (see .docker/frankenphp/docker-entrypoint.sh) ---
      FRANKENPHP_MODE: ${FRANKENPHP_MODE:-classic}
      FRANKENPHP_WORKER_NUM: ${FRANKENPHP_WORKER_NUM:-}
      FRANKENPHP_LOOP_MAX: ${FRANKENPHP_LOOP_MAX:-500}
      FRANKENPHP_RESET_KERNEL: ${FRANKENPHP_RESET_KERNEL:-false}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    volumes:
      # Bind-mount is required: without it, the image welcome index.php is served
      # and worker mode fails with "has not reached frankenphp_handle_request()".
      - ./:/app
      - ./.docker/frankenphp/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./.docker/frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      - /app/var
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - target: 80
        published: ${HTTP_PORT:-9080}
        protocol: tcp
      - target: 443
        published: ${HTTPS_PORT:-9443}
        protocol: tcp
      - target: 443
        published: ${HTTP3_PORT:-9443}
        protocol: udp
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true

  # Vite / Pentatrion (pnpm) — HMR on host port VITE_PORT (default 5173).
  # Same image as php (Node + pnpm installed in Dockerfile).
  vite:
    image: ${IMAGES_PREFIX:-}symfony-beacon-dev
    build:
      context: .
      target: frankenphp_dev
    restart: unless-stopped
    working_dir: /app
    depends_on:
      php:
        condition: service_started
    environment:
      VITE_PORT: ${VITE_PORT:-5173}
      VITE_DEV_SERVER_HOST: ${VITE_DEV_SERVER_HOST:-localhost}
      VITE_USE_POLLING: ${VITE_USE_POLLING:-0}
    volumes:
      - ./:/app
      - /app/var
    ports:
      - target: 5173
        published: ${VITE_PORT:-5173}
        protocol: tcp
    command: ["pnpm", "run", "dev"]
    tty: true

  ###> doctrine/doctrine-bundle ###
  # MySQL 9.7 (latest stable official: https://hub.docker.com/_/mysql)
  database:
    image: mysql:${MYSQL_VERSION:-9.7}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-!ChangeMe!}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-!ChangeMeRoot!}
    volumes:
      - database_data:/var/lib/mysql
    ports:
      - target: 3306
        published: ${MYSQL_PORT:-3307}
        protocol: tcp
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD:-!ChangeMeRoot!}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
  ###< doctrine/doctrine-bundle ###

  # Symfony Messenger worker (consumes the async MySQL queue).
  # Different from FRANKENPHP_MODE=worker (HTTP). This service does NOT serve HTTP.
  messenger:
    image: ${IMAGES_PREFIX:-}symfony-beacon-dev
    build:
      context: .
      target: frankenphp_dev
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      php:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-ChangeMePleaseUseARealSecret}
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-!ChangeMe!}@database:3306/${MYSQL_DATABASE:-app}?serverVersion=${MYSQL_VERSION:-9.7}&charset=utf8mb4
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default?auto_setup=1}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    volumes:
      - ./:/app
      - /app/var
    # Entrypoint prepares vendor/DB; then consumes the async queue.
    # --time-limit restarts the process periodically (Compose brings it back up).
    command:
      [
        "php",
        "bin/console",
        "messenger:consume",
        "async",
        "-vv",
        "--time-limit=3600",
        "--memory-limit=128M",
      ]
    tty: true

volumes:
  caddy_data:
  caddy_config:
  ###> doctrine/doctrine-bundle ###
  database_data:
  ###< doctrine/doctrine-bundle ###
