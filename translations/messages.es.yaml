        created: Destino de notificación creado.
        updated: Destino de notificación actualizado.
        enabled: Destino activado.
        disabled: Destino desactivado.
        deleted: Destino eliminado.
        test_queued: Notificación de prueba encolada.
    help:
        title: Guías de configuración de notificaciones
        link: Guías de configuración
        back: Volver a configuración
        toc: Ir al canal
        intro: Instrucciones paso a paso para conectar Slack, Discord, Microsoft Teams, Telegram, email o un webhook HTTP genérico a este proyecto.
        payload_label: 'Beacon envía:'
        docs_hint: 'Referencia completa (payloads, entrega, permisos): docs/NOTIFICATIONS.md en el repositorio.'
        slack:
            title: Slack (Incoming Webhook)
            lead: Crea un Incoming Webhook de app de Slack y pega la URL HTTPS en Beacon.
            step1: Abre api.slack.com/apps y crea una app From scratch para tu workspace.
            step2: Activa Incoming Webhooks, luego Add New Webhook to Workspace y elige un canal.
            step3: Copia la URL del webhook (https://hooks.slack.com/services/…).
            step4: En Beacon elige Slack Incoming Webhook, pega la URL como endpoint, selecciona categorías y guarda.
            step5: Pulsa Enviar prueba y confirma el mensaje en Slack.
            payload: JSON con text (resumen) y un objeto beacon con el payload completo del evento.
            tip: Prefiere un canal de ops dedicado. Rota el webhook en Slack si se filtra y actualiza el destino en Beacon.
        discord:
            title: Discord (webhook)
            lead: Crea un webhook de canal en Discord y pega su URL en Beacon.
            step1: Abre Ajustes del servidor → Integraciones → Webhooks (o Integraciones del canal).
            step2: Crea un webhook nuevo, nómbralo (por ejemplo Beacon) y elige el canal.
            step3: Copia la URL del webhook (https://discord.com/api/webhooks/…).
            step4: En Beacon elige Webhook de Discord, pega la URL, selecciona categorías, guarda y Enviar prueba.
            payload: JSON con content (resumen) y un array embeds (title, description, URL opcional de la incidencia).
            tip: Discord limita la tasa de webhooks; Beacon entrega de forma asíncrona vía Messenger.
        teams:
            title: Microsoft Teams (Incoming Webhook)
            lead: Añade un conector Incoming Webhook a un canal de Teams y pega la URL en Beacon.
            step1: En el menú del canal de Teams abre Conectores (o Administrar canal → Conectores).
            step2: Configura Incoming Webhook, asígnale un nombre y créalo.
            step3: Copia la URL del webhook que proporciona Teams.
            step4: En Beacon elige Webhook de Microsoft Teams, pega la URL, selecciona categorías, guarda y Enviar prueba.
            payload: JSON MessageCard de Office 365 con summary, title, text y acción Abrir en Beacon si hay URL.
            tip: Si tu tenant solo permite Workflows en lugar de Incoming Webhooks clásicos, apunta un destino HTTP genérico a un flujo que acepte POST JSON.
        telegram:
            title: Telegram (bot)
            lead: Crea un bot con BotFather y guarda bot_token@chat_id como endpoint en Beacon.
            step1: Abre @BotFather en Telegram, ejecuta /newbot y copia el token del bot.
            step2: Inicia un chat privado con el bot, o añádelo a un grupo y envía un mensaje.
            step3: Llama a getUpdates en la Bot API y lee message.chat.id (los grupos suelen ser negativos).
            step4: En Beacon elige Bot de Telegram y pon el endpoint como bot_token@chat_id (ejemplo — 123:AA…@-1001234567890).
            step5: Guarda y Enviar prueba.
            payload: sendMessage de la Bot API con chat_id y text (solo el resumen; no el JSON completo).
            tip: El último @ del endpoint separa token y chat id. Los tokens se cifran en reposo como el resto de endpoints.
        email:
            title: Email
            lead: Entrega alertas a un buzón vía Symfony Mailer. Configura MAILER_DSN antes.
            step1: Define MAILER_DSN en .env o secretos de producción con un transporte real (SMTP, etc.). null://null no entrega.
            step2: En Beacon elige Email y pon como endpoint la dirección del destinatario.
            step3: Selecciona categorías, guarda, Enviar prueba y revisa bandeja/spam.
            payload: El asunto es el resumen; el cuerpo es el resumen más la URL de la incidencia o rendimiento si existe.
            tip: Usa un alias compartido de ops. Para digests más ricos, prefiere Slack/Discord/Teams o un puente HTTP.
        http:
            title: Webhook HTTP genérico
            lead: Envía por POST el JSON canónico de Beacon a cualquier endpoint HTTPS de automatización.
            step1: Expón una URL HTTPS que acepte POST con Content-Type application/json.
            step2: En Beacon elige Webhook HTTP genérico, pega la URL, selecciona categorías, guarda y Enviar prueba.
            step3: Confirma que tu servicio recibe el JSON canónico (event, summary, project, issue, url, category).
            payload: Payload JSON canónico como cuerpo de la petición (User-Agent symfony-beacon-notifications/1.0).
            tip: Prefiere HTTPS y autentica tu receptor. Evita apuntar a direcciones internas o de metadatos cloud.
