        endpoint: Endpoint
        endpoint_help: 'Slack / Discord / Teams / HTTP: URL HTTPS del webhook. Email: dirección del destinatario. Telegram: bot_token@chat_id'
        endpoint_invalid: El endpoint no coincide con el tipo seleccionado.
        endpoint_ssrf: El endpoint no puede apuntar a direcciones privadas, link-local o de metadatos cloud.
