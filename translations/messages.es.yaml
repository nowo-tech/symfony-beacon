        intro: 'Este aviso legal aplica a la instancia autoalojada de %brand% que estás visitando. Sustituye los marcadores siguientes por los datos reales del operador antes del uso público.'
        operator_heading: Operador
        operator_body: El operador de esta instancia es responsable del servicio y de los contenidos que publique aquí.
        hosting_heading: Alojamiento
        hosting_body: Este software puede alojarlo el operador o un proveedor de infraestructura elegido por el operador. Completa los detalles de hosting según tu despliegue.
        liability_heading: Responsabilidad
        liability_body: El software se ofrece tal cual. El operador sigue siendo responsable del uso lícito, del cumplimiento en protección de datos y de la exactitud de los textos legales específicos de esta instancia.
    privacy:
        title: Política de privacidad
        intro: 'Esta política describe cómo pueden tratarse datos personales al usar esta instancia de %brand%. El operador debe adaptarla a su organización y jurisdicción.'
        controller_heading: Responsable del tratamiento
        controller_body: El operador de esta instancia Beacon es el responsable del tratamiento de las cuentas y la telemetría almacenadas en su despliegue. Completa nombre legal y contacto en la página de Aviso legal.
        data_heading: Datos que tratamos
        data_body: Según cómo configure y use la instancia el operador, el tratamiento puede incluir:
        data_account: Datos de cuenta (correo, nombre visible, hash de contraseña, roles, preferencias)
        data_telemetry: Telemetría de errores y rendimiento enviada vía DSN / Envelope
        data_logs: Registros operativos y, opcionalmente, logs de consentimiento de cookies
        data_cookies: Cookies y tecnologías similares descritas en la página de Cookies
        purpose_heading: Finalidades
        purpose_body: Los datos se tratan para autenticar usuarios, operar el seguimiento de errores de los proyectos configurados, asegurar el servicio y (si está activo) recordar preferencias de cookies.
        retention_heading: Conservación
        retention_body: Los plazos de conservación los define el operador (ciclo de vida de cuentas, retención de proyectos, logs). Sustituye este párrafo por el calendario de tu organización.
        rights_heading: Tus derechos
        rights_body: Según la normativa aplicable (por ejemplo el RGPD), puedes tener derechos de acceso, rectificación, supresión, limitación, portabilidad y oposición. Contacta con el operador usando los datos del Aviso legal.
        cookies_heading: Cookies
        cookies_body: Usamos cookies necesarias para el acceso y el almacenamiento del consentimiento. Las categorías opcionales (preferencias, analítica) solo se activan si las permites en el banner de cookies.
    terms:
        title: Términos de uso
        intro: 'Estos términos regulan el uso de esta instancia de %brand%. El operador debe sustituir esta plantilla por términos acordes a su oferta (herramienta interna, SaaS, etc.).'
        service_heading: Servicio
        service_body: Beacon ofrece seguimiento autoalojado de errores y rendimiento para proyectos configurados por usuarios autorizados.
        accounts_heading: Cuentas
        accounts_body: Debes mantener la confidencialidad de tus credenciales y usar el servicio solo para proyectos y datos que estés autorizado a tratar.
        accept_heading: Uso aceptable
        accept_body: No abuses de la API de ingest, no intentes accesos no autorizados ni subas contenido ilícito. El operador puede suspender cuentas que incumplan estos términos.
        limitation_heading: Limitación de responsabilidad
        limitation_body: En la medida permitida por la ley, el operador y los autores del software no responden de daños indirectos derivados del uso del servicio. Revisa esta cláusula con asesoramiento legal.
        changes_heading: Cambios
        changes_body: El operador puede actualizar estos términos. El uso continuado tras el aviso puede implicar la aceptación de los términos actualizados cuando la ley lo permita.
    cookies:
        title: Cookies
        intro: 'Esta página describe las cookies y tecnologías similares usadas por esta instancia de %brand%. Usa Ajustes de cookies para cambiar las categorías opcionales.'
        categories_heading: Categorías
        cat_required: Necesarias
        cat_required_help: Imprescindibles para el acceso, la seguridad y guardar tu elección de cookies.
        cat_preferences: Preferencias
        cat_preferences_help: Funciones opcionales que recuerdan opciones de presentación no esenciales (si el operador las habilita).
        cat_analytics: Analítica
        cat_analytics_help: Cookies de medición opcionales (solo si el operador activa herramientas de analítica más adelante).
        inventory_heading: Inventario de cookies
        col_name: Nombre
        col_category: Categoría
        col_duration: Duración
        col_purpose: Finalidad
        duration_session: Sesión
        duration_remember: Hasta 7 días
        duration_consent: Aprox. 1 año
        purpose_session: Cookie de sesión PHP para la navegación autenticada.
        purpose_remember: Login persistente opcional «Recordarme».
        purpose_consent: Guarda las categorías de cookies elegidas y una clave anonimizada para el registro de consentimiento.
        storage_heading: Almacenamiento local
        storage_body: El tema (día/noche) puede guardarse en localStorage del navegador y no es una cookie. Suele considerarse necesario para la UX, pero el operador debe confirmarlo según su jurisdicción.

notifications:
    title: Notificaciones
    intro: Envía alertas a Slack, Discord, Teams, Telegram, email o un endpoint HTTP genérico cuando aparezcan incidencias nuevas, regresiones o grupos N+1.
