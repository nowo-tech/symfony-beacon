nowo_cookie_consent.analytics.title: 'Analítica'
nowo_cookie_consent.analytics.description: 'Cookies opcionales utilizadas para medir el uso y mejorar el servicio. Solo se establecen si usted consiente y el operador ha activado herramientas de analítica.'

nowo_cookie_consent.marketing.title: 'Marketing'
nowo_cookie_consent.marketing.description: 'Cookies opcionales utilizadas con fines publicitarios o de remarketing. Solo se establecen con su consentimiento previo.'

