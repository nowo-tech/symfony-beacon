nowo_cookie_consent.preferences.usage_title: 'Uso de cookies'
nowo_cookie_consent.preferences.usage_description: 'Utilizamos cookies y tecnologías similares. Las cookies estrictamente necesarias permanecen activas porque son esenciales para el funcionamiento del servicio (seguridad, gestión de sesión y registro de su consentimiento). Las cookies de analítica y de preferencias son opcionales y se activan únicamente con su consentimiento previo. Puede aceptar todas las categorías, rechazar las no esenciales o revisar cada categoría. Puede retirar o modificar su consentimiento en cualquier momento mediante Configuración de cookies.'
nowo_cookie_consent.preferences.description: 'Cookies opcionales que almacenan elecciones de presentación o de funciones no esenciales cuando usted habilita esta categoría.'

nowo_cookie_consent.functionality.title: 'Funcionalidad'
