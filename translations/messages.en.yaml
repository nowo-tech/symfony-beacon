legal:
    nav:
        label: Legal
    last_updated: 'Last updated: %date%'
    manage_cookies: Cookie settings
    placeholder:
        legal_name: 'Legal name: [Operator legal name — replace]'
        address: 'Address: [Registered address — replace]'
        contact_email: 'Contact: [privacy@example.com — replace]'
        registration: 'Company registry / tax ID: [if applicable — replace]'
    notice:
        title: Legal notice
        intro: 'This legal notice applies to the self-hosted %brand% instance you are visiting. Replace the placeholders below with the operator’s real details before public use.'
        operator_heading: Operator
        operator_body: The operator of this instance is responsible for the service and for the content they publish here.
        hosting_heading: Hosting
        hosting_body: This software may be hosted by the operator or a third-party infrastructure provider chosen by the operator. Hosting details should be completed by the operator.
        liability_heading: Liability
        liability_body: The software is provided as-is. The operator remains responsible for lawful use, data protection compliance, and the accuracy of operator-specific legal text on this instance.
    privacy:
        title: Privacy policy
        intro: 'This privacy policy describes how personal data may be processed when you use this %brand% instance. Operators must adapt this text to their organisation and jurisdiction.'
        controller_heading: Data controller
        controller_body: The operator of this Beacon instance is the data controller for accounts and telemetry stored on their deployment. Fill in legal name and contact details in the Legal notice page.
        data_heading: Data we process
        data_body: Depending on how the operator configures and uses the instance, processing may include:
        data_account: Account data (email, display name, password hash, roles, preferences)
        data_telemetry: Application error and performance telemetry sent via project DSN / Envelope ingest
        data_logs: Operational logs and optional cookie consent logs
        data_cookies: Cookies and similar technologies described on the Cookies page
        purpose_heading: Purposes
        purpose_body: Data is processed to authenticate users, operate error tracking for configured projects, secure the service, and (where enabled) remember cookie preferences.
        retention_heading: Retention
        retention_body: Retention periods are defined by the operator (account lifecycle, project data retention, log retention). Replace this paragraph with your organisation’s retention schedule.
        rights_heading: Your rights
        rights_body: Depending on applicable law (for example GDPR), you may have rights of access, rectification, erasure, restriction, portability, and objection. Contact the operator using the details on the Legal notice page.
        cookies_heading: Cookies
        cookies_body: We use necessary cookies for sign-in and consent storage. Optional categories (preferences, analytics) are only activated after you allow them in the cookie banner.
    terms:
        title: Terms of use
        intro: 'These terms govern use of this %brand% instance. Operators should replace this template with terms that match their offering (internal tool, customer SaaS, etc.).'
        service_heading: Service
        service_body: Beacon provides self-hosted error and performance tracking for projects configured by authorised users.
        accounts_heading: Accounts
        accounts_body: You must keep credentials confidential and use the service only for projects and data you are authorised to process.
        accept_heading: Acceptable use
        accept_body: Do not abuse the ingest API, attempt unauthorised access, or upload unlawful content. The operator may suspend accounts that violate these terms.
        limitation_heading: Limitation of liability
        limitation_body: To the extent permitted by law, the operator and software authors are not liable for indirect damages arising from use of the service. Operators should have counsel review this clause.
        changes_heading: Changes
        changes_body: The operator may update these terms. Continued use after notice constitutes acceptance of the updated terms where permitted by law.
    cookies:
        title: Cookies
        intro: 'This page describes cookies and similar technologies used by this %brand% instance. Use Cookie settings to change optional categories.'
        categories_heading: Categories
        cat_required: Required
        cat_required_help: Needed for sign-in, security, and storing your cookie choice.
        cat_preferences: Preferences
        cat_preferences_help: Optional features that remember non-essential presentation choices (when enabled by the operator).
        cat_analytics: Analytics
        cat_analytics_help: Optional measurement cookies (only if the operator enables analytics tooling later).
        inventory_heading: Cookie inventory
        col_name: Name
        col_category: Category
        col_duration: Duration
        col_purpose: Purpose
        duration_session: Session
        duration_remember: Up to 7 days
        duration_consent: About 1 year
        purpose_session: PHP session cookie for authenticated browsing.
        purpose_remember: Optional “Remember me” persistent login.
        purpose_consent: Stores cookie category choices and an anonymized consent key for logging.
        storage_heading: Local storage
        storage_body: Theme (day/night) may be stored in the browser’s localStorage and is not a cookie. It does not require consent under typical ePrivacy guidance for strictly necessary UX, but operators should confirm for their jurisdiction.
