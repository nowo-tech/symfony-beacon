mailer_settings:
    title: Mailer
    intro: Store the Symfony Mailer DSN encrypted in the database (not in .env). Magic-link sign-in stays hidden until a non-null DSN is saved here; email notification destinations also use this transport.
    status:
        database: Outbound mail uses the DSN saved in instance settings. Magic-link sign-in is available when this DSN is not a null transport.
        env_fallback: No database DSN yet — outbound mail falls back to MAILER_DSN from the environment (typically null://null). Magic-link sign-in stays disabled until you save an encrypted DSN here.
    current_dsn: 'Current DSN:'
    from_preview: 'From address: %from%'
    submit: Save mailer settings
    magic_ready: Magic-link email credentials are ready
    magic_blocked: Magic-link email is unavailable (save a deliverable encrypted DSN)
    sample:
        title: Send sample email
        intro: Delivers a test message using the encrypted Mailer DSN (same transport as magic-link sign-in).
        to_label: Recipient
        submit: Send sample
        unavailable: Save a valid encrypted Mailer DSN first (not null://), then you can send a sample.
        email_subject: 'Beacon mailer sample (magic-login credentials)'
        email_body: |
            This is a sample message from Administration → Mailer.

            If you received this, the encrypted Mailer DSN can deliver magic-login emails.
            From address: %from%
mercure_settings:
    title: Mercure
    intro: Optional live alerts for signed-in members when a new issue is created. Disabled by default — enable only when a Mercure hub is available. Web Push remains a separate Account → Display opt-in.
    manual_hint: 'Operator manual (hub, JWT secret, Compose, troubleshooting): docs/MERCURE.md in the repository.'
    status:
        active: Live Mercure alerts are enabled for members.
        inactive: Mercure is off
        inactive_help: Members will not open an EventSource until you enable Mercure here and provide a reachable hub URL + JWT secret (saved below or via environment).
        url_database: Hub publish URL is stored in instance settings.
        url_env: Hub publish URL falls back to MERCURE_URL from the environment.
        url_missing: No hub publish URL configured (set below or MERCURE_URL).
        secret_database: JWT secret is stored encrypted in instance settings.
        secret_env: JWT secret falls back to MERCURE_JWT_SECRET from the environment.
        secret_missing: No JWT secret configured (set below or MERCURE_JWT_SECRET).
    public_url_preview: 'Browser hub URL: %url%'
    push_note: Background PWA push is configured per user under Account → Display (requires VAPID_* keys). It does not depend on Mercure.
    submit: Save Mercure settings
instance_mercure:
    enabled:
        label: Enable Mercure live alerts
        help: When on, signed-in members subscribe to private project topics for new-issue toasts while the app is open.
    url:
        label: Publish URL (server)
        help: Leave blank to use MERCURE_URL (e.g. http://mercure/.well-known/mercure inside Compose).
    public_url:
        label: Public URL (browser)
        help: Leave blank to use MERCURE_PUBLIC_URL (usually same-origin /.well-known/mercure via Caddy).
    jwt_secret:
        label: JWT secret
        help: Leave blank to keep the current encrypted value or fall back to MERCURE_JWT_SECRET. Minimum 32 characters when set.
        too_short: JWT secret must be at least 32 characters.
        invalid: Enter a valid JWT secret string.
    clear_secret:
        label: Clear stored JWT secret
        help: Removes the database secret and falls back to MERCURE_JWT_SECRET until you save a new one.
instance_mailer:
    mailer_dsn:
        label: Mailer DSN
        help: Leave blank to keep the current encrypted value. Example smtp://user:pass@mail.example:587 — null:// is rejected (use Clear stored DSN instead).
