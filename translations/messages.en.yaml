        test_queued: Test notification queued for delivery.
    help:
        title: Notification setup guides
        link: Setup guides
        back: Back to settings
        toc: Jump to channel
        intro: Step-by-step instructions to connect Slack, Discord, Microsoft Teams, Telegram, email, or a generic HTTP webhook to this project.
        payload_label: 'Beacon sends:'
        docs_hint: 'Full reference (payloads, delivery, permissions): docs/NOTIFICATIONS.md in the repository.'
        slack:
            title: Slack (Incoming Webhook)
            lead: Create a Slack app Incoming Webhook and paste the HTTPS URL into Beacon.
            step1: Open api.slack.com/apps and create an app From scratch for your workspace.
            step2: Enable Incoming Webhooks, then Add New Webhook to Workspace and pick a channel.
            step3: Copy the webhook URL (https://hooks.slack.com/services/…).
            step4: In Beacon choose Slack Incoming Webhook, paste the URL as the endpoint, select categories, and save.
            step5: Click Send test and confirm the message appears in Slack.
            payload: JSON with text (summary) and a beacon object containing the full event payload.
            tip: Prefer a dedicated ops channel. Rotate the webhook in Slack if it ever leaks; update the destination in Beacon.
        discord:
            title: Discord (webhook)
            lead: Create a channel webhook in Discord and paste its URL into Beacon.
            step1: Open Server settings → Integrations → Webhooks (or the channel Integrations tab).
            step2: Create a New Webhook, name it (for example Beacon), and choose the target channel.
            step3: Copy Webhook URL (https://discord.com/api/webhooks/…).
            step4: In Beacon choose Discord webhook, paste the URL, select categories, save, then Send test.
            payload: JSON with content (summary) and an embeds array (title, description, optional issue URL).
            tip: Discord rate-limits webhooks; Beacon delivers asynchronously via Messenger.
        teams:
            title: Microsoft Teams (Incoming Webhook)
            lead: Add an Incoming Webhook connector to a Teams channel and paste the URL into Beacon.
            step1: In the Teams channel menu open Connectors (or Manage channel → Connectors).
            step2: Configure Incoming Webhook, give it a name, and create it.
            step3: Copy the webhook URL Teams provides.
            step4: In Beacon choose Microsoft Teams webhook, paste the URL, select categories, save, then Send test.
            payload: Office 365 MessageCard JSON with summary, title, text, and an Open in Beacon action when a URL exists.
            tip: If your tenant only allows Workflows instead of classic Incoming Webhooks, point a Generic HTTP destination at a workflow that accepts POST JSON.
        telegram:
            title: Telegram (bot)
            lead: Create a bot with BotFather and store bot_token@chat_id as the Beacon endpoint.
            step1: Open @BotFather in Telegram, run /newbot, and copy the bot token.
            step2: Start a private chat with the bot, or add it to a group and send a message.
            step3: Call getUpdates on the Bot API and read message.chat.id (group ids are often negative).
            step4: In Beacon choose Telegram bot and set the endpoint to bot_token@chat_id (example — 123:AA…@-1001234567890).
            step5: Save and Send test.
            payload: Bot API sendMessage with chat_id and text (summary only; not the full JSON payload).
            tip: The last @ in the endpoint splits token and chat id. Tokens are encrypted at rest like other endpoints.
        email:
            title: Email
            lead: Deliver alerts to a mailbox via Symfony Mailer. Configure MAILER_DSN first.
            step1: Set MAILER_DSN in .env or production secrets to a real transport (SMTP, etc.). null://null does not deliver.
            step2: In Beacon choose Email and set the endpoint to the recipient address.
            step3: Select categories, save, Send test, and check inbox/spam.
            payload: Email subject equals the summary; body is the summary plus the issue or performance URL when present.
            tip: Use a shared ops alias. For richer digests, prefer Slack/Discord/Teams or an HTTP bridge.
        http:
            title: Generic HTTP webhook
            lead: POST the canonical Beacon JSON payload to any HTTPS automation endpoint.
            step1: Expose an HTTPS URL that accepts POST with Content-Type application/json.
            step2: In Beacon choose Generic HTTP webhook, paste the URL, select categories, save, then Send test.
            step3: Confirm your service receives the canonical JSON body (event, summary, project, issue, url, category).
            payload: Canonical JSON payload as the request body (User-Agent symfony-beacon-notifications/1.0).
            tip: Prefer HTTPS and authenticate your receiver. Avoid pointing at internal or cloud metadata addresses.
