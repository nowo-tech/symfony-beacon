        invalid: Enter a valid Symfony Mailer DSN (for example smtp://user:pass@host:587).
        null_transport: null:// cannot deliver mail. Paste a real SMTP (or other) DSN, or use Clear stored DSN to fall back to the environment.
    clear_dsn:
        label: Clear stored DSN
        help: Removes the database DSN and falls back to MAILER_DSN from the environment until you save a new one.
