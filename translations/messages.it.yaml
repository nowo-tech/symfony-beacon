    notice:
        title: 'Avviso legale'
        intro: "Questa nota legale si applica all'istanza %brand% ospitata autonomamente che stai visitando. Sostituisci i segnaposto seguenti con i dettagli reali dell'operatore prima dell'uso pubblico."
        operator_heading: Operatore
        operator_body: "L'operatore di questa istanza è responsabile del servizio e del contenuto che pubblica qui."
        hosting_heading: Ospitare
        hosting_body: "Questo software può essere ospitato dall'operatore o da un fornitore di infrastrutture di terze parti scelto dall'operatore. I dettagli dell'hosting devono essere completati dall'operatore."
        liability_heading: Responsabilità
        liability_body: "Il software viene fornito così com'è. L'operatore rimane responsabile dell'uso legittimo, del rispetto della protezione dei dati e dell'accuratezza del testo legale specifico dell'operatore in questo caso."
    privacy:
        title: 'Politica sulla riservatezza'
        intro: 'La presente informativa sulla privacy descrive come i dati personali possono essere trattati quando si utilizza questa istanza %brand%. Gli operatori devono adattare questo testo alla loro organizzazione e giurisdizione.'
        controller_heading: 'Titolare del trattamento'
        controller_body: "L'operatore di questa istanza Beacon è il titolare del trattamento dei dati per gli account e i dati di telemetria archiviati nella relativa distribuzione. Inserisci il nome legale e i dettagli di contatto nella pagina Note legali."
        data_heading: 'Dati che elaboriamo'
        data_body: "A seconda di come l'operatore configura e utilizza l'istanza, l'elaborazione può includere:"
        data_account: "Dati dell'account (e-mail, nome visualizzato, hash della password, ruoli, preferenze)"
        data_telemetry: "Errore dell'applicazione e telemetria sulle prestazioni inviati tramite DSN del progetto/inserimento busta"
        data_logs: 'Log operativi e log di consenso sui cookie opzionali'
        data_cookies: 'Cookie e tecnologie simili descritte nella pagina Cookie'
        purpose_heading: Scopi
        purpose_body: 'I dati vengono elaborati per autenticare gli utenti, eseguire il tracciamento degli errori per i progetti configurati, proteggere il servizio e (ove abilitato) ricordare le preferenze dei cookie.'
        retention_heading: Conservazione
        retention_body: "I periodi di conservazione sono definiti dall'operatore (ciclo di vita dell'account, conservazione dei dati del progetto, conservazione dei registri). Sostituisci questo paragrafo con il programma di conservazione della tua organizzazione."
        rights_heading: 'I tuoi diritti'
        rights_body: "A seconda della legge applicabile (ad esempio GDPR), potresti avere diritti di accesso, rettifica, cancellazione, limitazione, portabilità e opposizione. Contatta l'operatore utilizzando i dettagli nella pagina Note legali."
        cookies_heading: Biscotti
        cookies_body: "Utilizziamo i cookie necessari per l'accesso e la memorizzazione del consenso. Le categorie opzionali (preferenze, analisi) vengono attivate solo dopo averle autorizzate nel banner dei cookie."
    terms:
        title: 'Termini di utilizzo'
        intro: "Questi termini regolano l'uso di questa istanza %brand%. Gli operatori dovrebbero sostituire questo modello con termini che corrispondano alla loro offerta (strumento interno, SaaS del cliente, ecc.)."
        service_heading: Servizio
        service_body: 'Beacon fornisce il monitoraggio autonomo degli errori e delle prestazioni per i progetti configurati dagli utenti autorizzati.'
        accounts_heading: Conti
        accounts_body: 'È necessario mantenere riservate le credenziali e utilizzare il servizio solo per progetti e dati che si è autorizzati a trattare.'
        accept_heading: 'Uso accettabile'
        accept_body: "Non abusare dell'API di acquisizione, tentare l'accesso non autorizzato o caricare contenuti illegali. L'operatore può sospendere gli account che violano questi termini."
        limitation_heading: 'Limitazione di responsabilità'
        limitation_body: "Nella misura consentita dalla legge, il gestore e gli autori del software non sono responsabili per danni indiretti derivanti dall'utilizzo del servizio. Gli operatori dovrebbero chiedere a un consulente legale di rivedere questa clausola."
        changes_heading: Cambiamenti
        changes_body: "L'operatore può aggiornare questi termini. L'uso continuato dopo il preavviso costituisce accettazione dei termini aggiornati ove consentito dalla legge."
    cookies:
        title: 'Informativa sui cookie'
        intro: 'Questa pagina descrive i cookie e le tecnologie simili utilizzati da questa istanza %brand%. I cookie strettamente necessari supportano autenticazione, sicurezza e registrazione del consenso. Le categorie opzionali sono utilizzate solo previo consenso. Utilizzi Impostazioni cookie per esaminare o modificare la selezione in qualsiasi momento.'
        categories_heading: Categorie
        cat_required: 'Strettamente necessari'
        cat_required_help: 'Indispensabili per autenticazione, sicurezza e registrazione della decisione di consenso. Questi cookie non possono essere disattivati.'
        cat_preferences: Preferenze
        cat_preferences_help: 'Cookie opzionali che memorizzano scelte di presentazione o di funzionalità non essenziali quando l’operatore li abilita e lei acconsente.'
        cat_analytics: Analitica
        cat_analytics_help: 'Cookie di misurazione opzionali, utilizzati solo se l’operatore abilita strumenti di analitica e lei presta il consenso preventivo.'
        inventory_heading: 'Inventario dei cookie'
        col_name: Nome
        col_category: Categoria
        col_duration: Durata
        col_purpose: Finalità
        duration_session: Sessione
        duration_remember: 'Fino a 7 giorni'
        duration_consent: 'Circa 1 anno'
        purpose_session: 'Mantiene la sessione HTTP autenticata necessaria per accedere alle aree protette del servizio.'
        purpose_remember: 'Consente l’autenticazione persistente quando all’accesso è selezionato “Ricordami” (token sicuro; durata limitata).'
        purpose_consent: 'Memorizza le decisioni sulle categorie di cookie e una chiave di consenso anonimizzata a fini di responsabilità e di audit.'
        storage_heading: 'Archiviazione locale'
        storage_body: 'La preferenza di tema (chiaro/scuro) può essere memorizzata nel localStorage del browser e non costituisce un cookie HTTP. Secondo le orientazioni ePrivacy tipiche può essere trattata come strettamente necessaria per un’interfaccia coerente; gli operatori devono confermare le norme applicabili nella propria giurisdizione.'
