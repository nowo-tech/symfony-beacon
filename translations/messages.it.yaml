        test_queued: 'Notifica di esempio nel formato del canale in coda per la consegna.'
    help:
        title: "Guide all'impostazione delle notifiche"
        link: 'Guide di installazione'
        back: 'Torna alle impostazioni'
        toc: 'Vai al canale'
        intro: 'Istruzioni dettagliate per connettere Slack, Discord, Microsoft Teams, Telegram, e-mail o un webhook HTTP generico a questo progetto.'
        payload_label: 'Il faro invia:'
        docs_hint: 'Riferimento completo (payload, consegna, autorizzazioni): docs/NOTIFICAZIONI.md nel repository.'
        slack:
            title: 'Slack (webhook in entrata)'
            lead: "Crea un webhook in entrata dell'app Slack e incolla l'URL HTTPS in Beacon."
            step1: "Apri api.slack.com/apps e crea un'app da zero per il tuo spazio di lavoro."
            step2: "Abilita i webhook in entrata, quindi Aggiungi nuovo webhook all'area di lavoro e scegli un canale."
            step3: "Copia l'URL del webhook (https://hooks.slack.com/services/…)."
            step4: "In Beacon scegli Slack Incoming Webhook, incolla l'URL come endpoint, seleziona le categorie e salva."
            step5: 'Fai clic su Invia test e conferma che il messaggio venga visualizzato in Slack.'
            payload: "JSON con testo (riepilogo) e un oggetto beacon contenente il payload completo dell'evento."
            tip: 'Preferisci un canale operativo dedicato. Ruota il webhook in Slack in caso di perdite; aggiornare la destinazione in Beacon.'
        discord:
            title: 'Discordia (webhook)'
            lead: 'Crea un webhook del canale in Discord e incolla il suo URL in Beacon.'
            step1: 'Apri Impostazioni server → Integrazioni → Webhook (o la scheda Integrazioni del canale).'
            step2: 'Crea un nuovo webhook, assegnagli un nome (ad esempio Beacon) e scegli il canale di destinazione.'
            step3: "Copia l'URL del webhook (https://discord.com/api/webhooks/…)."
            step4: "In Beacon scegli Discord webhook, incolla l'URL, seleziona le categorie, salva, quindi Invia test."
            payload: 'JSON con contenuto (riepilogo) e un array di incorporamenti (titolo, descrizione, URL del problema opzionale).'
            tip: 'Webhook con limiti di velocità Discord; Beacon effettua consegne in modo asincrono tramite Messenger.'
        teams:
            title: 'Microsoft Teams (webhook in entrata)'
            lead: "Aggiungi un connettore Webhook in entrata a un canale Teams e incolla l'URL in Beacon."
            step1: 'Nel menu canale Teams apri Connettori (o Gestisci canale → Connettori).'
            step2: 'Configura il Webhook in entrata, dagli un nome e crealo.'
            step3: "Copia l'URL del webhook fornito da Teams."
            step4: "In Beacon scegli webhook Microsoft Teams, incolla l'URL, seleziona le categorie, salva, quindi Invia test."
            payload: "Office 365 MessageCard JSON con riepilogo, titolo, testo e un'azione Apri in beacon quando esiste un URL."
            tip: 'Se il tuo tenant consente solo flussi di lavoro invece dei classici webhook in entrata, indirizza una destinazione HTTP generica a un flusso di lavoro che accetta POST JSON.'
        telegram:
            title: 'Telegramma (bot)'
            lead: 'Crea un bot con BotFather e archivia bot_token@chat_id come endpoint Beacon.'
            step1: 'Apri @BotFather in Telegram, esegui /newbot e copia il token del bot.'
            step2: 'Avvia una chat privata con il bot oppure aggiungilo a un gruppo e invia un messaggio.'
            step3: "Chiama getUpdates sull'API Bot e leggi message.chat.id (gli ID di gruppo sono spesso negativi)."
            step4: "In Beacon scegli il bot di Telegram e imposta l'endpoint su bot_token@chat_id (esempio: 123:AA…@-1001234567890)."
            step5: 'Salva e invia test.'
            payload: 'API bot sendMessage con chat_id e testo (solo riepilogo; non il payload JSON completo).'
            tip: "L'ultimo @ nell'endpoint divide il token e l'ID chat. I token vengono crittografati quando sono inattivi come gli altri endpoint."
        email:
            title: E-mail
            lead: 'Invia avvisi a una casella di posta tramite Symfony Mailer. Configura prima MAILER_DSN.'
            step1: 'Imposta MAILER_DSN in .env o i segreti di produzione su un trasporto reale (SMTP, ecc.). null://null non consegna.'
            step2: "In Beacon scegli Email e imposta l'endpoint sull'indirizzo del destinatario."
            step3: 'Seleziona le categorie, salva, Invia test e controlla la posta in arrivo/spam.'
            payload: "L'oggetto dell'e-mail corrisponde al riepilogo; body è il riepilogo più l'URL del problema o del rendimento, se presente."
            tip: 'Utilizza un alias operativo condiviso. Per digest più ricchi, preferisci Slack/Discord/Teams o un bridge HTTP.'
        http:
            title: 'Webhook HTTP generico'
            lead: 'POST il payload canonico Beacon JSON su qualsiasi endpoint di automazione HTTPS.'
            step1: 'Esporre un URL HTTPS che accetta POST con applicazione/json di tipo contenuto.'
            step2: "In Beacon scegli Webhook HTTP generico, incolla l'URL, seleziona le categorie, salva, quindi Invia test."
            step3: 'Verifica che il tuo servizio riceva il corpo JSON canonico (evento, riepilogo, progetto, problema, URL, categoria).'
            payload: 'Payload JSON canonico come corpo della richiesta (User-Agent symfony-beacon-notifications/1.0).'
            tip: 'Preferisci HTTPS e autentica il tuo ricevitore. Evitare di puntare a indirizzi di metadati interni o cloud.'
