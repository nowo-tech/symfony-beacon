        slack:
            title: Slack (inkomende webhook)
            lead: Maak een Slack-app Inkomende webhook en plak de HTTPS-URL in Beacon.
            step1: Open api.slack.com/apps en maak een geheel nieuwe app voor uw werkruimte.
            step2: 'Schakel inkomende webhooks in, voeg vervolgens een nieuwe webhook toe aan de werkruimte en kies een kanaal.'
            step3: 'Kopieer de webhook-URL (https://hooks.slack.com/services/…).'
            step4: 'Kies in Beacon Slack Incoming Webhook, plak de URL als eindpunt, selecteer categorieën en sla op.'
            step5: Klik op Test verzenden en bevestig dat het bericht in Slack verschijnt.
            payload: JSON met tekst (samenvatting) en een bakenobject dat de volledige payload van de gebeurtenis bevat.
            tip: Geef de voorkeur aan een speciaal ops-kanaal. Draai de webhook in Slack als deze ooit lekt; update de bestemming in Beacon.
        discord:
            title: Onenigheid (webhook)
            lead: Maak een kanaalwebhook in Discord en plak de URL ervan in Beacon.
            step1: Open Serverinstellingen → Integraties → Webhooks (of het tabblad Kanaalintegraties).
            step2: 'Maak een nieuwe webhook, geef deze een naam (bijvoorbeeld Beacon) en kies het doelkanaal.'
            step3: 'Kopieer de webhook-URL (https://discord.com/api/webhooks/…).'
            step4: 'Kies in Beacon Discord-webhook, plak de URL, selecteer categorieën, sla op en verzend vervolgens de test.'
            payload: 'JSON met inhoud (samenvatting) en een insluitingsarray (titel, beschrijving, optionele probleem-URL).'
            tip: Webhooks met onenigheidslimieten; Beacon levert asynchroon via Messenger.
        teams:
            title: Microsoft Teams (inkomende webhook)
            lead: Voeg een Inkomende Webhook-connector toe aan een Teams-kanaal en plak de URL in Beacon.
            step1: Open in het Teams-kanaalmenu Connectors (of Kanaal beheren → Connectors).
            step2: 'Configureer Inkomende Webhook, geef het een naam en maak het.'
            step3: Kopieer de webhook-URL die Teams levert.
            step4: 'Kies in Beacon de Microsoft Teams-webhook, plak de URL, selecteer categorieën, sla op en verzend vervolgens de test.'
            payload: 'Office 365 MessageCard JSON met samenvatting, titel, tekst en een actie Openen in Beacon wanneer er een URL bestaat.'
            tip: 'Als uw tenant alleen werkstromen toestaat in plaats van klassieke inkomende webhooks, wijs dan een algemene HTTP-bestemming naar een werkstroom die POST JSON accepteert.'
        telegram:
            title: Telegram (bot)
            lead: 'Maak een bot met BotFather en sla bot_token@chat_id op als het Beacon-eindpunt.'
            step1: 'Open @BotFather in Telegram, voer /newbot uit en kopieer het bottoken.'
            step2: 'Start een privéchat met de bot, of voeg hem toe aan een groep en stuur een bericht.'
            step3: Roep getUpdates aan op de Bot API en lees message.chat.id (groeps-ID's zijn vaak negatief).
            step4: 'Kies in Beacon de Telegram-bot en stel het eindpunt in op bot_token@chat_id (bijvoorbeeld: 123:AA…@-1001234567890).'
            step5: Test opslaan en verzenden.
            payload: Bot API sendMessage met chat_id en tekst (alleen samenvatting; niet de volledige JSON-payload).
            tip: 'De laatste @ in het eindpunt splitst token en chat-ID. Tokens worden in rust versleuteld, net als andere eindpunten.'
        email:
            title: E-mail
            lead: Stuur waarschuwingen naar een mailbox via Symfony Mailer. Configureer eerst MAILER_DSN.
            step1: 'Stel MAILER_DSN in .env of productiegeheimen in op een echt transport (SMTP, enz.). null://null levert niet op.'
            step2: Kies in Beacon E-mail en stel het eindpunt in op het adres van de ontvanger.
            step3: 'Categorieën selecteren, opslaan, test verzenden en inbox/spam controleren.'
            payload: 'E-mailonderwerp is gelijk aan de samenvatting; body is de samenvatting plus de probleem- of prestatie-URL, indien aanwezig.'
            tip: Gebruik een gedeelde ops-alias. Voor rijkere samenvattingen geeft u de voorkeur aan Slack/Discord/Teams of een HTTP-bridge.
        http:
            title: Generieke HTTP-webhook
            lead: POST de canonieke Beacon JSON-payload naar elk HTTPS-automatiseringseindpunt.
            step1: Maak een HTTPS-URL beschikbaar die POST accepteert met Content-Type application/json.
            step2: 'Kies in Beacon Generieke HTTP-webhook, plak de URL, selecteer categorieën, sla op en verzend vervolgens de test.'
            step3: 'Bevestig dat uw service de canonieke JSON-hoofdtekst ontvangt (gebeurtenis, samenvatting, project, probleem, URL, categorie).'
            payload: Canonieke JSON-payload als verzoektekst (User-Agent symfony-beacon-notifications/1.0).
            tip: Geef de voorkeur aan HTTPS en authenticeer uw ontvanger. Vermijd het verwijzen naar interne of cloud-metagegevensadressen.
