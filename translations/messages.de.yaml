        intro: 'Diese Bedingungen regeln die Nutzung dieser %brand%-Instanz. Betreiber sollten diese Vorlage durch Bedingungen ersetzen, die zu ihrem Angebot passen (internes Tool, Kunden-SaaS usw.).'
        service_heading: Service
        service_body: 'Beacon bietet selbstgehostete Fehler- und Leistungsverfolgung für Projekte, die von autorisierten Benutzern konfiguriert wurden.'
        accounts_heading: Konten
        accounts_body: 'Sie müssen Ihre Zugangsdaten vertraulich behandeln und den Dienst nur für Projekte und Daten nutzen, zu deren Verarbeitung Sie berechtigt sind.'
        accept_heading: Akzeptable Verwendung
