        controller_heading: Datenverantwortlicher
        controller_body: Der Betreiber dieser Beacon-Instanz ist der Datenverantwortliche für die in seiner Bereitstellung gespeicherten Konten und Telemetriedaten. Geben Sie auf der Seite „Rechtliche Hinweise“ den Firmennamen und die Kontaktdaten ein.
        data_heading: 'Daten, die wir verarbeiten'
        data_body: 'Abhängig davon, wie der Betreiber die Instanz konfiguriert und nutzt, kann die Verarbeitung Folgendes umfassen:'
        data_account: 'Kontodaten (E-Mail, Anzeigename, Passwort-Hash, Rollen, Präferenzen)'
        data_telemetry: 'Anwendungsfehler- und Leistungstelemetrie, gesendet über Projekt-DSN/Envelope-Ingest'
        data_logs: Betriebsprotokolle und optionale Cookie-Zustimmungsprotokolle
        data_cookies: Auf der Seite „Cookies“ beschriebene Cookies und ähnliche Technologien
        purpose_heading: Zwecke
        purpose_body: 'Die Daten werden verarbeitet, um Benutzer zu authentifizieren, die Fehlerverfolgung für konfigurierte Projekte durchzuführen, den Dienst zu sichern und (sofern aktiviert) sich Cookie-Einstellungen zu merken.'
        retention_heading: Zurückbehaltung
        retention_body: 'Aufbewahrungsfristen werden vom Betreiber definiert (Kontolebenszyklus, Projektdatenaufbewahrung, Protokollaufbewahrung). Ersetzen Sie diesen Absatz durch den Aufbewahrungsplan Ihrer Organisation.'
        rights_heading: Ihre Rechte
        rights_body: 'Je nach geltendem Recht (z. B. DSGVO) haben Sie möglicherweise Rechte auf Zugang, Berichtigung, Löschung, Einschränkung, Übertragbarkeit und Widerspruch. Kontaktieren Sie den Betreiber über die Kontaktdaten auf der Seite „Rechtliche Hinweise“.'
        cookies_heading: Kekse
        cookies_body: 'Für die Anmeldung und Einwilligungsspeicherung verwenden wir notwendige Cookies. Optionale Kategorien (Einstellungen, Analysen) werden erst aktiviert, nachdem Sie sie im Cookie-Banner zulassen.'
    terms:
