            step3: 'Kopieren Sie die Webhook-URL (https://hooks.slack.com/services/…).'
            step4: 'Wählen Sie in Beacon „Slack Incoming Webhook“, fügen Sie die URL als Endpunkt ein, wählen Sie Kategorien aus und speichern Sie.'
            step5: 'Klicken Sie auf Test senden und bestätigen Sie, dass die Nachricht in Slack angezeigt wird.'
            payload: 'JSON mit Text (Zusammenfassung) und einem Beacon-Objekt, das die vollständige Ereignisnutzlast enthält.'
            tip: 'Bevorzugen Sie einen dedizierten Operationskanal. Rotieren Sie den Webhook in Slack, falls er jemals ausläuft; Aktualisieren Sie das Ziel in Beacon.'
        discord:
            title: Discord (Webhook)
            lead: Erstellen Sie einen Kanal-Webhook in Discord und fügen Sie seine URL in Beacon ein.
            step1: Öffnen Sie Servereinstellungen → Integrationen → Webhooks (oder die Registerkarte „Kanalintegrationen“).
            step2: 'Erstellen Sie einen neuen Webhook, benennen Sie ihn (z. B. Beacon) und wählen Sie den Zielkanal aus.'
            step3: 'Kopieren Sie die Webhook-URL (https://discord.com/api/webhooks/…).'
            step4: 'Wählen Sie in Beacon den Discord-Webhook aus, fügen Sie die URL ein, wählen Sie Kategorien aus, speichern Sie und senden Sie dann den Test.'
            payload: 'JSON mit Inhalt (Zusammenfassung) und einem Einbettungsarray (Titel, Beschreibung, optionale Problem-URL).'
            tip: Discord-Rate begrenzt Webhooks; Beacon liefert asynchron über Messenger.
        teams:
            title: Microsoft Teams (Eingehender Webhook)
            lead: Fügen Sie einem Teams-Kanal einen eingehenden Webhook-Connector hinzu und fügen Sie die URL in Beacon ein.
            step1: Öffnen Sie im Teams-Kanalmenü Connectors (oder Kanal verwalten → Connectors).
            step2: 'Konfigurieren Sie den eingehenden Webhook, geben Sie ihm einen Namen und erstellen Sie ihn.'
            step3: Kopieren Sie die von Teams bereitgestellte Webhook-URL.
            step4: 'Wählen Sie in Beacon den Microsoft Teams-Webhook aus, fügen Sie die URL ein, wählen Sie Kategorien aus, speichern Sie und senden Sie dann den Test.'
            payload: 'Office 365 MessageCard JSON mit Zusammenfassung, Titel, Text und einer Aktion „In Beacon öffnen“, wenn eine URL vorhanden ist.'
            tip: 'Wenn Ihr Mandant nur Workflows statt klassischer eingehender Webhooks zulässt, verweisen Sie ein generisches HTTP-Ziel auf einen Workflow, der POST JSON akzeptiert.'
        telegram:
            title: Telegramm (Bot)
            lead: 'Erstellen Sie einen Bot mit BotFather und speichern Sie bot_token@chat_id als Beacon-Endpunkt.'
            step1: 'Öffnen Sie @BotFather in Telegram, führen Sie /newbot aus und kopieren Sie das Bot-Token.'
            step2: Starten Sie einen privaten Chat mit dem Bot oder fügen Sie ihn einer Gruppe hinzu und senden Sie eine Nachricht.
            step3: Rufen Sie getUpdates auf der Bot-API auf und lesen Sie message.chat.id (Gruppen-IDs sind oft negativ).
            step4: 'Wählen Sie in Beacon den Telegram-Bot und stellen Sie den Endpunkt auf bot_token@chat_id ein (Beispiel: 123:AA…@-1001234567890).'
            step5: Test speichern und senden.
            payload: Bot-API sendMessage mit chat_id und Text (nur Zusammenfassung; nicht die vollständige JSON-Nutzlast).
            tip: 'Das letzte @ im Endpunkt teilt Token und Chat-ID. Token werden im Ruhezustand wie andere Endpunkte verschlüsselt.'
        email:
            title: E-Mail
            lead: Senden Sie Benachrichtigungen über Symfony Mailer an ein Postfach. Konfigurieren Sie zuerst MAILER_DSN.
            step1: 'Legen Sie MAILER_DSN in .env oder Produktionsgeheimnissen auf einen echten Transport (SMTP usw.) fest. null://null liefert nicht.'
            step2: Wählen Sie in Beacon E-Mail und stellen Sie den Endpunkt auf die Empfängeradresse ein.
            step3: 'Kategorien auswählen, speichern, Test senden und Posteingang/Spam überprüfen.'
            payload: 'Der E-Mail-Betreff entspricht der Zusammenfassung. Der Hauptteil ist die Zusammenfassung plus der Problem- oder Leistungs-URL, sofern vorhanden.'
            tip: Verwenden Sie einen Shared-Ops-Alias. Für umfangreichere Digests bevorzugen Sie Slack/Discord/Teams oder eine HTTP-Bridge.
        http:
            title: Allgemeiner HTTP-Webhook
            lead: POSTEN Sie die kanonische Beacon-JSON-Nutzlast an einen beliebigen HTTPS-Automatisierungsendpunkt.
            step1: 'Stellen Sie eine HTTPS-URL bereit, die POST mit dem Inhaltstyp application/json akzeptiert.'
            step2: 'Wählen Sie in Beacon „Generischer HTTP-Webhook“, fügen Sie die URL ein, wählen Sie Kategorien aus, speichern Sie und senden Sie dann den Test.'
            step3: 'Bestätigen Sie, dass Ihr Dienst den kanonischen JSON-Text (Ereignis, Zusammenfassung, Projekt, Problem, URL, Kategorie) erhält.'
            payload: Kanonische JSON-Nutzlast als Anforderungstext (User-Agent symfony-beacon-notifications/1.0).
            tip: 'Bevorzugen Sie HTTPS und authentifizieren Sie Ihren Empfänger. Vermeiden Sie es, auf interne oder Cloud-Metadatenadressen zu verweisen.'
