        registration: 'Handelsregister/Steuernummer: [falls zutreffend – ersetzen]'
    notice:
        title: 'Rechtlicher Hinweis'
        intro: 'Dieser rechtliche Hinweis gilt für die selbstgehostete %brand%-Instanz, die Sie besuchen. Ersetzen Sie die Platzhalter unten durch die tatsächlichen Angaben des Betreibers, bevor Sie sie öffentlich verwenden.'
        operator_heading: Operator
        operator_body: 'Für den Dienst und die hier veröffentlichten Inhalte ist der Betreiber dieser Instanz verantwortlich.'
        hosting_heading: Hosting
        hosting_body: 'Diese Software kann vom Betreiber oder einem vom Betreiber ausgewählten externen Infrastrukturanbieter gehostet werden. Die Hosting-Details sollten vom Betreiber ausgefüllt werden.'
        liability_heading: Haftung
        liability_body: 'Die Software wird im Ist-Zustand bereitgestellt. Der Betreiber bleibt für die rechtmäßige Nutzung, die Einhaltung des Datenschutzes und die Richtigkeit der betreiberspezifischen Rechtstexte in diesem Fall verantwortlich.'
    privacy:
        title: Datenschutzrichtlinie
        intro: 'Diese Datenschutzerklärung beschreibt, wie personenbezogene Daten verarbeitet werden können, wenn Sie diese %brand%-Instanz nutzen. Betreiber müssen diesen Text an ihre Organisation und Rechtsprechung anpassen.'
        controller_heading: Datenverantwortlicher
        controller_body: 'Der Betreiber dieser Beacon-Instanz ist der Datenverantwortliche für die in seiner Bereitstellung gespeicherten Konten und Telemetriedaten. Geben Sie auf der Seite „Rechtliche Hinweise“ den Firmennamen und die Kontaktdaten ein.'
        data_heading: 'Daten, die wir verarbeiten'
        data_body: 'Abhängig davon, wie der Betreiber die Instanz konfiguriert und nutzt, kann die Verarbeitung Folgendes umfassen:'
        data_account: 'Kontodaten (E-Mail, Anzeigename, Passwort-Hash, Rollen, Präferenzen)'
        data_telemetry: 'Anwendungsfehler- und Leistungstelemetrie, gesendet über Projekt-DSN/Envelope-Ingest'
        data_logs: 'Betriebsprotokolle und optionale Cookie-Zustimmungsprotokolle'
        data_cookies: 'Auf der Seite „Cookies“ beschriebene Cookies und ähnliche Technologien'
        purpose_heading: Zwecke
        purpose_body: 'Die Daten werden verarbeitet, um Benutzer zu authentifizieren, die Fehlerverfolgung für konfigurierte Projekte durchzuführen, den Dienst zu sichern und (sofern aktiviert) sich Cookie-Einstellungen zu merken.'
        retention_heading: Zurückbehaltung
        retention_body: 'Aufbewahrungsfristen werden vom Betreiber definiert (Kontolebenszyklus, Projektdatenaufbewahrung, Protokollaufbewahrung). Ersetzen Sie diesen Absatz durch den Aufbewahrungsplan Ihrer Organisation.'
        rights_heading: 'Ihre Rechte'
        rights_body: 'Je nach geltendem Recht (z. B. DSGVO) haben Sie möglicherweise Rechte auf Zugang, Berichtigung, Löschung, Einschränkung, Übertragbarkeit und Widerspruch. Kontaktieren Sie den Betreiber über die Kontaktdaten auf der Seite „Rechtliche Hinweise“.'
        cookies_heading: Kekse
        cookies_body: 'Für die Anmeldung und Einwilligungsspeicherung verwenden wir notwendige Cookies. Optionale Kategorien (Einstellungen, Analysen) werden erst aktiviert, nachdem Sie sie im Cookie-Banner zulassen.'
    terms:
        title: Nutzungsbedingungen
        intro: 'Diese Bedingungen regeln die Nutzung dieser %brand%-Instanz. Betreiber sollten diese Vorlage durch Bedingungen ersetzen, die zu ihrem Angebot passen (internes Tool, Kunden-SaaS usw.).'
        service_heading: Service
        service_body: 'Beacon bietet selbstgehostete Fehler- und Leistungsverfolgung für Projekte, die von autorisierten Benutzern konfiguriert wurden.'
        accounts_heading: Konten
        accounts_body: 'Sie müssen Ihre Zugangsdaten vertraulich behandeln und den Dienst nur für Projekte und Daten nutzen, zu deren Verarbeitung Sie berechtigt sind.'
        accept_heading: 'Akzeptable Verwendung'
        accept_body: 'Missbrauchen Sie die Aufnahme-API nicht, versuchen Sie nicht, unbefugt darauf zuzugreifen und laden Sie keine rechtswidrigen Inhalte hoch. Der Betreiber kann Konten sperren, die gegen diese Bedingungen verstoßen.'
        limitation_heading: Haftungsbeschränkung
        limitation_body: 'Soweit gesetzlich zulässig, haften der Betreiber und die Software-Autoren nicht für indirekte Schäden, die aus der Nutzung des Dienstes entstehen. Betreiber sollten diese Klausel von einem Anwalt überprüfen lassen.'
        changes_heading: Änderungen
        changes_body: 'Der Betreiber kann diese Bedingungen aktualisieren. Die fortgesetzte Nutzung nach der Benachrichtigung stellt die Annahme der aktualisierten Bedingungen dar, sofern dies gesetzlich zulässig ist.'
    cookies:
        title: Cookie-Hinweis
        intro: 'Auf dieser Seite werden die Cookies und ähnlichen Technologien beschrieben, die von dieser %brand%-Instanz verwendet werden. Unbedingt erforderliche Cookies unterstützen Authentifizierung, Sicherheit und die Speicherung Ihrer Einwilligung. Optionale Kategorien werden nur mit Ihrer vorherigen Einwilligung eingesetzt. Über die Cookie-Einstellungen können Sie Ihre Auswahl jederzeit einsehen oder ändern.'
        categories_heading: Kategorien
        cat_required: 'Unbedingt erforderlich'
        cat_required_help: 'Unerlässlich für Authentifizierung, Sicherheit und Speicherung Ihrer Einwilligungsentscheidung. Diese Cookies können nicht deaktiviert werden.'
        cat_preferences: Präferenzen
        cat_preferences_help: 'Optionale Cookies, die nicht wesentliche Darstellungs- oder Funktionseinstellungen speichern, sofern der Betreiber sie aktiviert und Sie zustimmen.'
        cat_analytics: Analyse
        cat_analytics_help: 'Optionale Mess-Cookies, die nur eingesetzt werden, wenn der Betreiber Analysetools aktiviert und Sie zuvor einwilligen.'
        inventory_heading: Cookie-Inventar
        col_name: Name
        col_category: Kategorie
        col_duration: Dauer
        col_purpose: Zweck
        duration_session: Sitzung
        duration_remember: 'Bis zu 7 Tage'
        duration_consent: 'Etwa 1 Jahr'
        purpose_session: 'Erhält die authentifizierte HTTP-Sitzung aufrecht, die für den Zugriff auf geschützte Bereiche des Dienstes erforderlich ist.'
        purpose_remember: 'Ermöglicht dauerhafte Authentifizierung, wenn bei der Anmeldung „Angemeldet bleiben“ gewählt wird (sicheres Token; begrenzte Laufzeit).'
        purpose_consent: 'Speichert Cookie-Kategorieentscheidungen und einen anonymisierten Einwilligungsschlüssel zu Nachweis- und Prüfzwecken.'
        storage_heading: 'Lokaler Speicher'
        storage_body: 'Die Theme-Präferenz (hell/dunkel) kann im LocalStorage des Browsers gespeichert werden und ist kein HTTP-Cookie. Nach typischer ePrivacy-Orientierung kann dies als unbedingt erforderlich für eine kohärente Benutzeroberfläche gelten; Betreiber sollten die in ihrer Rechtsordnung geltenden Vorgaben prüfen.'
