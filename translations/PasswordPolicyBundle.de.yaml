# Beacon overrides for nowo-tech/password-policy-bundle (toast title + body).
nowo_password_policy:
    title: Ihr Passwort ist abgelaufen
    message: Aktualisieren Sie es unter Konto → Sicherheit, um angemeldet zu bleiben.
    password_in_history: Ein kürzlich verwendetes Passwort kann nicht erneut genutzt werden. Sie haben dieses vor {{ days }} Tagen verwendet.
