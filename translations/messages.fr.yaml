        created: Destination de notification créée.
        updated: Destination de notification mise à jour.
        enabled: Destination activée.
        disabled: Destination désactivée.
        deleted: Destination supprimée.
        test_queued: Notification d’exemple au format du canal en attente de livraison.
    help:
        title: Guides de configuration des notifications
        link: Guides de configuration
        back: Retour aux paramètres
        toc: Accéder à la chaîne
        intro: 'Instructions étape par étape pour connecter Slack, Discord, Microsoft Teams, Telegram, e-mail ou un webhook HTTP générique à ce projet.'
        payload_label: 'La balise envoie :'
        docs_hint: 'Référence complète (charges utiles, livraison, autorisations) : docs/NOTIFICATIONS.md dans le référentiel.'
        slack:
            title: Slack (Webhook entrant)
            lead: Créez un webhook entrant pour l’application Slack et collez l’URL HTTPS dans Beacon.
            step1: Ouvrez api.slack.com/apps et créez une application à partir de zéro pour votre espace de travail.
            step2: 'Activez les Webhooks entrants, puis ajoutez un nouveau Webhook à l''espace de travail et choisissez un canal.'
            step3: 'Copiez l''URL du webhook (https://hooks.slack.com/services/…).'
            step4: 'Dans Beacon, choisissez Slack Incoming Webhook, collez l''URL comme point de terminaison, sélectionnez les catégories et enregistrez.'
            step5: Cliquez sur Envoyer le test et confirmez que le message apparaît dans Slack.
            payload: JSON avec du texte (résumé) et un objet balise contenant la charge utile complète de l'événement.
            tip: Préférez un canal opérationnel dédié. Faites pivoter le webhook dans Slack en cas de fuite ; mettre à jour la destination dans Beacon.
        discord:
            title: Discorde (webhook)
            lead: Créez un webhook de chaîne dans Discord et collez son URL dans Beacon.
            step1: Ouvrez Paramètres du serveur → Intégrations → Webhooks (ou l'onglet Intégrations du canal).
            step2: 'Créez un nouveau Webhook, nommez-le (par exemple Beacon) et choisissez le canal cible.'
            step3: 'Copiez l''URL du Webhook (https://discord.com/api/webhooks/…).'
            step4: 'Dans Beacon, choisissez le webhook Discord, collez l''URL, sélectionnez les catégories, enregistrez, puis envoyez le test.'
            payload: 'JSON avec du contenu (résumé) et un tableau d''intégration (titre, description, URL du problème facultatif).'
            tip: Webhooks Discord limitant le débit ; Beacon livre de manière asynchrone via Messenger.
        teams:
            title: Microsoft Teams (Webhook entrant)
            lead: Ajoutez un connecteur Webhook entrant à un canal Teams et collez l'URL dans Beacon.
            step1: 'Dans le menu du canal Teams, ouvrez Connecteurs (ou Gérer le canal → Connecteurs).'
            step2: 'Configurez le Webhook entrant, donnez-lui un nom et créez-le.'
            step3: Copiez l’URL du webhook fournie par Teams.
            step4: 'Dans Beacon, choisissez le webhook Microsoft Teams, collez l''URL, sélectionnez les catégories, enregistrez, puis envoyez le test.'
            payload: 'Office 365 MessageCard JSON avec résumé, titre, texte et action Ouvrir dans une balise lorsqu''une URL existe.'
            tip: 'Si votre locataire autorise uniquement les workflows au lieu des webhooks entrants classiques, pointez une destination HTTP générique vers un workflow qui accepte POST JSON.'
        telegram:
            title: Télégramme (bot)
            lead: 'Créez un bot avec BotFather et stockez bot_token@chat_id comme point de terminaison Beacon.'
            step1: 'Ouvrez @BotFather dans Telegram, exécutez /newbot et copiez le jeton du bot.'
            step2: Démarrez une discussion privée avec le bot ou ajoutez-le à un groupe et envoyez un message.
            step3: Appelez getUpdates sur l'API Bot et lisez message.chat.id (les identifiants de groupe sont souvent négatifs).
            step4: 'Dans Beacon, choisissez le bot Telegram et définissez le point de terminaison sur bot_token@chat_id (exemple — 123:AA…@-1001234567890).'
            step5: Enregistrez et envoyez le test.
            payload: API du robot sendMessage avec chat_id et texte (résumé uniquement ; pas la charge utile JSON complète).
            tip: 'Le dernier @ dans le point de terminaison divise le jeton et l''identifiant de discussion. Les jetons sont chiffrés au repos comme les autres points de terminaison.'
        email:
            title: E-mail
            lead: Envoyez des alertes à une boîte aux lettres via Symfony Mailer. Configurez d'abord MAILER_DSN.
            step1: 'Définissez MAILER_DSN dans .env ou les secrets de production sur un transport réel (SMTP, etc.). null://null ne livre pas.'
            step2: 'Dans Beacon, choisissez Email et définissez le point de terminaison sur l''adresse du destinataire.'
            step3: 'Sélectionnez les catégories, enregistrez, envoyez le test et vérifiez la boîte de réception/spam.'
            payload: Le sujet de l'e-mail est égal au résumé ; body est le résumé plus l’URL du problème ou de la performance lorsqu’elle est présente.
            tip: 'Utilisez un alias d’opérations partagé. Pour des résumés plus riches, préférez Slack/Discord/Teams ou un pont HTTP.'
        http:
            title: Webhook HTTP générique
            lead: POSTez la charge utile canonique Beacon JSON sur n’importe quel point de terminaison d’automatisation HTTPS.
            step1: Exposez une URL HTTPS qui accepte POST avec Content-Type application/json.
            step2: 'Dans Beacon, choisissez Webhook HTTP générique, collez l''URL, sélectionnez les catégories, enregistrez, puis envoyez le test.'
            step3: 'Confirmez que votre service reçoit le corps canonique JSON (événement, résumé, projet, problème, URL, catégorie).'
            payload: Charge utile JSON canonique comme corps de la requête (User-Agent symfony-beacon-notifications/1.0).
            tip: Préférez HTTPS et authentifiez votre récepteur. Évitez de pointer vers des adresses de métadonnées internes ou cloud.
