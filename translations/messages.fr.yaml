        service_heading: Service
        service_body: Beacon fournit un suivi des erreurs et des performances auto-hébergé pour les projets configurés par des utilisateurs autorisés.
        accounts_heading: Comptes
        accounts_body: Vous devez garder vos informations d'identification confidentielles et utiliser le service uniquement pour les projets et les données que vous êtes autorisé à traiter.
        accept_heading: Utilisation acceptable
        accept_body: 'N''abusez pas de l''API d''ingestion, ne tentez pas d''accès non autorisé ou ne téléchargez pas de contenu illégal. L''opérateur peut suspendre les comptes qui violent ces conditions.'
