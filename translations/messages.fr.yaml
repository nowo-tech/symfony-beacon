        controller_heading: Responsable du traitement des données
        controller_body: L'opérateur de cette instance Beacon est le contrôleur des données pour les comptes et la télémétrie stockés sur leur déploiement. Remplissez le nom légal et les coordonnées dans la page Mentions légales.
        data_heading: Données que nous traitons
        data_body: 'Selon la manière dont l''opérateur configure et utilise l''instance, le traitement peut inclure :'
        data_account: 'Données du compte (e-mail, nom d''affichage, hachage du mot de passe, rôles, préférences)'
        data_telemetry: Erreur d'application et télémétrie de performances envoyées via le DSN du projet / l'ingestion d'enveloppe
        data_logs: Journaux opérationnels et journaux de consentement aux cookies facultatifs
        data_cookies: Cookies et technologies similaires décrits sur la page Cookies
        purpose_heading: Objectifs
        purpose_body: 'Les données sont traitées pour authentifier les utilisateurs, effectuer le suivi des erreurs pour les projets configurés, sécuriser le service et (si activé) mémoriser les préférences en matière de cookies.'
        retention_heading: Rétention
        retention_body: 'Les durées de conservation sont définies par l''opérateur (cycle de vie du compte, conservation des données du projet, conservation des logs). Remplacez ce paragraphe par le calendrier de conservation de votre organisation.'
        rights_heading: Vos droits
        rights_body: 'En fonction de la loi applicable (par exemple RGPD), vous pouvez disposer de droits d''accès, de rectification, d''effacement, de restriction, de portabilité et d''opposition. Contactez l''opérateur en utilisant les coordonnées figurant sur la page Mentions légales.'
        cookies_heading: Cookies
        cookies_body: 'Nous utilisons les cookies nécessaires à la connexion et au stockage du consentement. Les catégories facultatives (préférences, analyses) ne sont activées qu''après que vous les ayez autorisées dans la bannière des cookies.'
    terms:
