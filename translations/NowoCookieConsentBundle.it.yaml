nowo_cookie_consent.preferences.usage_title: 'Utilizzo dei cookie'
nowo_cookie_consent.preferences.usage_description: 'Utilizziamo cookie e tecnologie simili. I cookie strettamente necessari restano attivi perché essenziali al funzionamento del servizio (sicurezza, gestione della sessione e registrazione del consenso). I cookie di analisi e di preferenze sono opzionali e vengono attivati solo con il consenso preventivo. Può accettare tutte le categorie, rifiutare i non essenziali o esaminare ciascuna categoria. Può revocare o modificare il consenso in qualsiasi momento tramite Impostazioni cookie.'
nowo_cookie_consent.preferences.description: 'Cookie opzionali che memorizzano scelte di presentazione o di funzionalità non essenziali quando attiva questa categoria.'

