nowo_cookie_consent.title: 'Cookie notice'
nowo_cookie_consent.intro: 'This service uses cookies and similar technologies to operate securely and to remember your choices. Strictly necessary cookies are required for core functionality and cannot be disabled. Optional cookies are used only with your prior consent.'
