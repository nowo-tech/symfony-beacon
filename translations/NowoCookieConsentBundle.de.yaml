nowo_cookie_consent.preferences.title: 'Präferenzen'
nowo_cookie_consent.preferences.close: 'Zurück'
nowo_cookie_consent.preferences.usage_title: 'Verwendung von Cookies'
nowo_cookie_consent.preferences.usage_description: 'Wir verwenden Cookies und ähnliche Technologien. Unbedingt erforderliche Cookies bleiben aktiv, weil sie für den Betrieb des Dienstes unerlässlich sind (Sicherheit, Sitzungsverwaltung und Speicherung Ihrer Einwilligung). Analyse- und Präferenz-Cookies sind optional und werden nur mit Ihrer vorherigen Einwilligung aktiviert. Sie können alle Kategorien akzeptieren, nicht erforderliche ablehnen oder jede Kategorie prüfen. Sie können Ihre Einwilligung jederzeit über die Cookie-Einstellungen widerrufen oder ändern.'
nowo_cookie_consent.preferences.description: 'Optionale Cookies, die nicht wesentliche Darstellungs- oder Funktionseinstellungen speichern, wenn Sie diese Kategorie aktivieren.'

nowo_cookie_consent.functionality.title: 'Funktionalität'
nowo_cookie_consent.functionality.description: 'Optionale Cookies, die erweiterte Funktionen über den Kernbetrieb des Dienstes hinaus ermöglichen.'

nowo_cookie_consent.analytics.title: 'Analyse'
nowo_cookie_consent.analytics.description: 'Optionale Cookies zur Messung der Nutzung und zur Verbesserung des Dienstes. Sie werden nur gesetzt, wenn Sie einwilligen und der Betreiber Analyse-Tools aktiviert hat.'

nowo_cookie_consent.marketing.title: 'Marketing'
nowo_cookie_consent.marketing.description: 'Optionale Cookies für Werbung oder Remarketing. Sie werden nur mit Ihrer vorherigen Einwilligung gesetzt.'

