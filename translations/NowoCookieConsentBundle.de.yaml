nowo_cookie_consent.title: 'Cookie-Hinweis'
nowo_cookie_consent.intro: 'Dieser Dienst verwendet Cookies und ähnliche Technologien, um sicher zu funktionieren und Ihre Auswahl zu speichern. Unbedingt erforderliche Cookies sind für Kernfunktionen notwendig und können nicht deaktiviert werden. Optionale Cookies werden nur mit Ihrer vorherigen Einwilligung eingesetzt.'
