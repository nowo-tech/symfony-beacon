nowo_cookie_consent.title: 'Aviso de cookies'
nowo_cookie_consent.intro: 'Este serviço utiliza cookies e tecnologias semelhantes para funcionar de forma segura e recordar as suas escolhas. Os cookies estritamente necessários são imprescindíveis para a funcionalidade essencial e não podem ser desativados. Os cookies opcionais são utilizados apenas com o seu consentimento prévio.'
