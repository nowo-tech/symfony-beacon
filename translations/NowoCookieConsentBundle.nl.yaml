nowo_cookie_consent.preferences.usage_title: 'Gebruik van cookies'
nowo_cookie_consent.preferences.usage_description: 'Wij gebruiken cookies en vergelijkbare technologieën. Strikt noodzakelijke cookies blijven actief omdat ze essentieel zijn voor het functioneren van de dienst (beveiliging, sessiebeheer en vastlegging van uw toestemming). Analyse- en voorkeurscookies zijn optioneel en worden alleen met uw voorafgaande toestemming geactiveerd. U kunt alle categorieën accepteren, niet-essentiële weigeren of elke categorie beoordelen. U kunt uw toestemming te allen tijde intrekken of wijzigen via Cookie-instellingen.'
nowo_cookie_consent.preferences.description: 'Optionele cookies die niet-essentiële presentatie- of functiekeuzes opslaan wanneer u deze categorie inschakelt.'

nowo_cookie_consent.functionality.title: 'Functionaliteit'
nowo_cookie_consent.functionality.description: 'Optionele cookies die uitgebreide functies mogelijk maken naast de kernwerking van de dienst.'

nowo_cookie_consent.analytics.title: 'Analyse'
nowo_cookie_consent.analytics.description: 'Optionele cookies om het gebruik te meten en de dienst te verbeteren. Ze worden alleen geplaatst als u toestemt en de beheerder analysetools heeft ingeschakeld.'

nowo_cookie_consent.marketing.title: 'Marketing'
nowo_cookie_consent.marketing.description: 'Optionele cookies voor reclame of remarketing. Ze worden alleen met uw voorafgaande toestemming geplaatst.'

