    help:
        title: Guias de configuração de notificação
        link: Guias de configuração
        back: Voltar às configurações
        toc: Ir para o canal
        intro: 'Instruções passo a passo para conectar Slack, Discord, Microsoft Teams, Telegram, email ou um webhook HTTP genérico a este projeto.'
        payload_label: 'O farol envia:'
        docs_hint: 'Referência completa (payloads, entrega, permissões): docs/NOTIFICATIONS.md no repositório.'
        slack:
            title: Slack (webhook de entrada)
            lead: Crie um Webhook de entrada do aplicativo Slack e cole o URL HTTPS no Beacon.
            step1: Abra api.slack.com/apps e crie um aplicativo do zero para seu espaço de trabalho.
            step2: 'Habilite Webhooks de entrada, adicione novo webhook ao espaço de trabalho e escolha um canal.'
            step3: 'Copie o URL do webhook (https://hooks.slack.com/services/…).'
            step4: 'No Beacon, escolha Slack Incoming Webhook, cole o URL como endpoint, selecione categorias e salve.'
            step5: Clique em Enviar teste e confirme se a mensagem aparece no Slack.
            payload: JSON com texto (resumo) e um objeto beacon contendo a carga completa do evento.
            tip: Prefira um canal de operações dedicado. Gire o webhook no Slack se ele vazar; atualize o destino no Beacon.
        discord:
            title: Discord (webhook)
            lead: Crie um webhook de canal no Discord e cole seu URL no Beacon.
            step1: Abra Configurações do servidor → Integrações → Webhooks (ou a guia Integrações do canal).
            step2: 'Crie um novo Webhook, nomeie-o (por exemplo, Beacon) e escolha o canal de destino.'
            step3: 'Copie o URL do Webhook (https://discord.com/api/webhooks/…).'
            step4: 'No Beacon, escolha Discord webhook, cole o URL, selecione as categorias, salve e envie o teste.'
            payload: 'JSON com conteúdo (resumo) e um array de incorporações (título, descrição, URL de problema opcional).'
            tip: Webhooks de limites de taxa de discórdia; Beacon entrega de forma assíncrona via Messenger.
        teams:
            title: Microsoft Teams (Webhook de entrada)
            lead: Adicione um conector Webhook de entrada a um canal do Teams e cole a URL no Beacon.
            step1: 'No menu do canal do Teams, abra Conectores (ou Gerenciar canal → Conectores).'
            step2: 'Configure o Incoming Webhook, dê um nome a ele e crie-o.'
            step3: Copie o URL do webhook fornecido pelo Teams.
            step4: 'No Beacon, escolha o webhook do Microsoft Teams, cole o URL, selecione as categorias, salve e envie o teste.'
            payload: 'JSON do MessageCard do Office 365 com resumo, título, texto e uma ação Abrir no Beacon quando existe um URL.'
            tip: 'Se o seu locatário permitir apenas fluxos de trabalho em vez de Webhooks de entrada clássicos, aponte um destino HTTP genérico para um fluxo de trabalho que aceite POST JSON.'
        telegram:
            title: Telegrama (bot)
            lead: 'Crie um bot com BotFather e armazene bot_token@chat_id como endpoint do Beacon.'
            step1: 'Abra @BotFather no Telegram, execute /newbot e copie o token do bot.'
            step2: Inicie um bate-papo privado com o bot ou adicione-o a um grupo e envie uma mensagem.
            step3: Chame getUpdates na API do Bot e leia message.chat.id (os IDs de grupo geralmente são negativos).
            step4: 'No Beacon, escolha o bot do Telegram e defina o endpoint como bot_token@chat_id (exemplo — 123:AA…@-1001234567890).'
            step5: Salvar e enviar teste.
            payload: Bot API sendMessage com chat_id e texto (somente resumo; não a carga JSON completa).
            tip: 'O último @ no endpoint divide o token e o ID do chat. Os tokens são criptografados em repouso como outros endpoints.'
        email:
            title: E-mail
            lead: Entregue alertas para uma caixa de correio via Symfony Mailer. Configure MAILER_DSN primeiro.
            step1: 'Defina MAILER_DSN em .env ou segredos de produção para um transporte real (SMTP, etc.). null://null não entrega.'
            step2: 'No Beacon, escolha Email e defina o endpoint para o endereço do destinatário.'
            step3: 'Selecione categorias, salve, envie teste e verifique caixa de entrada/spam.'
            payload: 'O assunto do email é igual ao resumo; body é o resumo mais o URL do problema ou desempenho, quando presente.'
            tip: 'Use um alias de operações compartilhado. Para resumos mais ricos, prefira Slack/Discord/Teams ou uma ponte HTTP.'
        http:
            title: Webhook HTTP genérico
            lead: POST a carga canônica do Beacon JSON em qualquer endpoint de automação HTTPS.
            step1: Exponha uma URL HTTPS que aceite POST com Content-Type application/json.
            step2: 'No Beacon, escolha webhook HTTP genérico, cole o URL, selecione categorias, salve e envie teste.'
            step3: 'Confirme se seu serviço recebe o corpo JSON canônico (evento, resumo, projeto, problema, URL, categoria).'
            payload: Carga JSON canônica como corpo da solicitação (User-Agent symfony-beacon-notifications/1.0).
            tip: Prefira HTTPS e autentique seu receptor. Evite apontar para endereços de metadados internos ou na nuvem.
