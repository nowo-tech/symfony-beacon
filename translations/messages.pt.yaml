        operator_heading: Operador
        operator_body: 'O operador desta instância é responsável pelo serviço e pelo conteúdo que aqui publica.'
        hosting_heading: Hospedagem
        hosting_body: 'Este software pode ser hospedado pela operadora ou por um provedor de infraestrutura terceirizado escolhido pela operadora. Os detalhes da hospedagem devem ser preenchidos pela operadora.'
        liability_heading: Responsabilidade
        liability_body: 'O software é fornecido como está. O operador continua responsável pelo uso legal, pela conformidade com a proteção de dados e pela exatidão do texto jurídico específico do operador nesta instância.'
    privacy:
        title: 'Política de Privacidade'
        intro: 'Esta política de privacidade descreve como os dados pessoais podem ser processados ​​quando você usa esta instância %brand%. Os operadores devem adaptar este texto à sua organização e jurisdição.'
        controller_heading: 'Controlador de dados'
        controller_body: 'O operador desta instância Beacon é o controlador de dados para contas e telemetria armazenadas em sua implantação. Preencha o nome legal e os dados de contato na página Aviso legal.'
        data_heading: 'Dados que processamos'
        data_body: 'Dependendo de como o operador configura e utiliza a instância, o processamento pode incluir:'
        data_account: 'Dados da conta (e-mail, nome de exibição, hash de senha, funções, preferências)'
        data_telemetry: 'Erro de aplicativo e telemetria de desempenho enviada por meio de ingestão de DSN/envelope do projeto'
        data_logs: 'Logs operacionais e logs de consentimento de cookies opcionais'
        data_cookies: 'Cookies e tecnologias semelhantes descritas na página Cookies'
        purpose_heading: Finalidades
        purpose_body: 'Os dados são processados ​​para autenticar usuários, operar o rastreamento de erros para projetos configurados, proteger o serviço e (quando habilitado) lembrar preferências de cookies.'
        retention_heading: Retenção
        retention_body: 'Os períodos de retenção são definidos pelo operador (ciclo de vida da conta, retenção de dados do projeto, retenção de log). Substitua este parágrafo pelo cronograma de retenção da sua organização.'
        rights_heading: 'Seus direitos'
        rights_body: 'Dependendo da lei aplicável (por exemplo, GDPR), você poderá ter direitos de acesso, retificação, apagamento, restrição, portabilidade e oposição. Contacte o operador através dos dados na página Aviso legal.'
        cookies_heading: Biscoitos
        cookies_body: 'Usamos cookies necessários para login e armazenamento de consentimento. Categorias opcionais (preferências, análises) só são ativadas depois que você as permite no banner de cookies.'
    terms:
        title: 'Termos de uso'
        intro: 'Estes termos regem o uso desta instância %brand%. As operadoras devem substituir este modelo por termos que correspondam à sua oferta (ferramenta interna, SaaS do cliente, etc.).'
        service_heading: Serviço
        service_body: 'O Beacon fornece rastreamento de erros e desempenho auto-hospedado para projetos configurados por usuários autorizados.'
        accounts_heading: Contas
        accounts_body: 'Você deve manter as credenciais confidenciais e usar o serviço somente para projetos e dados que você está autorizado a processar.'
        accept_heading: 'Uso aceitável'
        accept_body: 'Não abuse da API de ingestão, tente acesso não autorizado ou carregue conteúdo ilegal. A operadora pode suspender contas que violem estes termos.'
        limitation_heading: 'Limitação de responsabilidade'
        limitation_body: 'Na medida permitida por lei, o operador e os autores do software não são responsáveis ​​por danos indiretos decorrentes da utilização do serviço. As operadoras devem pedir a um advogado que analise esta cláusula.'
        changes_heading: Mudanças
        changes_body: 'A operadora poderá atualizar estes termos. O uso continuado após aviso constitui aceitação dos termos atualizados quando permitido por lei.'
    cookies:
        title: 'Aviso de cookies'
        intro: 'Esta página descreve os cookies e tecnologias semelhantes utilizados por esta instância %brand%. Os cookies estritamente necessários suportam autenticação, segurança e registo do consentimento. As categorias opcionais são utilizadas apenas com o seu consentimento prévio. Utilize as Definições de cookies para rever ou alterar a sua seleção a qualquer momento.'
        categories_heading: Categorias
        cat_required: 'Estritamente necessários'
        cat_required_help: 'Imprescindíveis para autenticação, segurança e registo da sua decisão de consentimento. Estes cookies não podem ser desativados.'
        cat_preferences: Preferências
        cat_preferences_help: 'Cookies opcionais que armazenam escolhas de apresentação ou de funcionalidades não essenciais quando o operador as ativa e você consente.'
        cat_analytics: Analítica
        cat_analytics_help: 'Cookies de medição opcionais, utilizados apenas se o operador ativar ferramentas de analítica e você der consentimento prévio.'
        inventory_heading: 'Inventário de cookies'
