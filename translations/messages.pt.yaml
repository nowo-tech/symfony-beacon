        col_category: Categoria
        col_duration: Duração
        col_purpose: Finalidade
        duration_session: Sessão
        duration_remember: 'Até 7 dias'
        duration_consent: 'Aproximadamente 1 ano'
        purpose_session: 'Mantém a sessão HTTP autenticada necessária para aceder às áreas protegidas do serviço.'
        purpose_remember: 'Permite autenticação persistente quando “Lembrar-me” é selecionado no início de sessão (token seguro; validade limitada).'
        purpose_consent: 'Armazena decisões de categorias de cookies e uma chave de consentimento anonimizada para fins de responsabilização e auditoria.'
        storage_heading: 'Armazenamento local'
        storage_body: 'A preferência de tema (claro/escuro) pode ser armazenada no localStorage do navegador e não constitui um cookie HTTP. Segundo as orientações típicas de ePrivacy, pode ser tratada como estritamente necessária para uma interface coerente; os operadores devem confirmar as regras aplicáveis na sua jurisdição.'
